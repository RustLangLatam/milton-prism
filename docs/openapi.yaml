                  in: query
                  description: Restrict results to summaries in this lifecycle state.
                  schema:
                    example: ANALYSIS_STATE_COMPLETED
                    enum:
                        - ANALYSIS_STATE_UNSPECIFIED
                        - ANALYSIS_STATE_RUNNING
                        - ANALYSIS_STATE_COMPLETED
                        - ANALYSIS_STATE_FAILED
                    type: string
                    description: Filter by analysis lifecycle state.
                    format: enum
                - name: pageParams.order
                  in: query
                  description: Sort order.
                  schema:
                    example: desc
                    enum:
                        - ORDER_DESC_UNSPECIFIED
                        - ORDER_ASC
                    type: string
                    default: asc
                    description: Sort order
                    format: enum
                - name: pageParams.pageNumber
                  in: query
                  description: Result page number to retrieve.
                  schema:
                    example: 2
                    minLength: 1
                    type: integer
                    description: Page number
                    format: uint32
                - name: pageParams.pageSize
                  in: query
                  description: Maximum number of records per page.
                  schema:
                    example: 20
                    maxLength: 100
                    minLength: 10
                    type: integer
                    default: !!float 10
                    description: Records per page
                    format: uint32
                - name: pageParams.sortBy
                  in: query
                  description: The key to sort the results by.
                  schema:
                    example: create_time
                    type: string
                    default: create_time
                    description: Field to sort by
            responses:
                "200":
                    description: OK
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/ListAnalysisSummariesResponse'
                default:
                    description: Default Api GateWay error response
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Status'
