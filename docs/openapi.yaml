        The **Milton Prism API-Gateway** is the single entry point for all external traffic. It translates HTTP/JSON requests into gRPC calls and forwards them to the appropriate backend microservice.

        ### API Design Standards

        All RPCs follow **Google API Improvement Proposals (AIPs)**.
