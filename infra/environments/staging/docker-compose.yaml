---
# Run from this directory:
#   docker compose up --build -d
#
# External networks must exist:
#   docker network create milton-prism-network
#   docker network create cache-network
#
# Copy .env.example → .env and fill in values.

networks:
  milton-prism-network:
    external: true
  cache-network:
    external: true

volumes:
  keydb-data:
  mongodb-data:
  prometheus-data:
  grafana-data:
  tempo-data:
  loki-data:
  pyroscope-data:

# ── Reusable fragments ────────────────────────────────────────────────────────

x-logging: &logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"
    tag: "{{.Name}}"

x-grpc-env: &grpc-env
  GRPC_GO_LOG_SEVERITY_LEVEL: info
  OTEL_EXPORTER_OTLP_ENDPOINT: otel-collector:4317
  OTEL_EXPORTER_OTLP_INSECURE: "true"
  DEPLOYMENT_ENVIRONMENT: staging
  OTEL_TRACES_SAMPLER_ARG: "0.25"
  MILTON_PRISM_METRICS_ENABLED: "true"
  MILTON_PRISM_TRACES_ENABLED:  "true"
  MILTON_PRISM_PROFILING_ENABLED: "true"
  PYROSCOPE_SERVER_ADDRESS: http://pyroscope:4040
  CONFIG_OVERLAY_PATH: /etc/config.overlay.toml

x-grpc-service: &grpc-service
  environment: *grpc-env
  networks:
    - milton-prism-network
    - cache-network
  healthcheck:
    test: ["CMD", "grpc_health_probe", "-addr=:50051", "-connect-timeout=2s"]
    interval: 10s
    timeout: 5s
    retries: 5
    start_period: 15s
  depends_on:
    keydb-replica-0:
      condition: service_healthy
    mongodb:
      condition: service_healthy
  restart: unless-stopped
  stop_grace_period: 30s
  logging: *logging
  security_opt:
    - no-new-privileges:true
  deploy:
    resources:
      limits:
        cpus: "1.0"
        memory: 256M
      reservations:
        memory: 64M
  ulimits:
    nofile:
      soft: 65535
      hard: 65535

# ── Services ──────────────────────────────────────────────────────────────────

services:

  identity-services:
    <<: *grpc-service
    ports:
      - "5100:50051"
    build:
      context: ../..
      dockerfile: Dockerfile.service
      args:
        SERVICE_BINARY: identity_service
    volumes:
      - ../../services/identity-services/config.toml:/etc/config.toml:ro
      - ./overlay/identity-services/config.toml:/etc/config.overlay.toml:ro
      - /etc/localtime:/etc/localtime:ro

  repository-services:
    <<: *grpc-service
    ports:
      - "5101:50051"
    build:
      context: ../..
      dockerfile: Dockerfile.service
      args:
        SERVICE_BINARY: repository_service
    volumes:
      - ../../services/repository-services/config.toml:/etc/config.toml:ro
      - ./overlay/repository-services/config.toml:/etc/config.overlay.toml:ro
      - /etc/localtime:/etc/localtime:ro

  migration-services:
    <<: *grpc-service
    ports:
      - "5102:50051"
    build:
      context: ../..
      dockerfile: Dockerfile.service
      args:
        SERVICE_BINARY: migration_service
    volumes:
      - ../../services/migration-services/config.toml:/etc/config.toml:ro
      - ./overlay/migration-services/config.toml:/etc/config.overlay.toml:ro
      - /etc/localtime:/etc/localtime:ro

  # ── Gateway ──────────────────────────────────────────────────────────────────

  milton-prism-gateway:
    build:
      context: ../..
      dockerfile: Dockerfile.gateway
      args:
        SERVICE_BINARY: milton_prism_gateway
    environment:
      GRPC_GO_LOG_SEVERITY_LEVEL: info
      OTEL_EXPORTER_OTLP_ENDPOINT: otel-collector:4317
      OTEL_EXPORTER_OTLP_INSECURE: "true"
    volumes:
      - ../../services/milton-prism-gateway/config.toml:/etc/config.toml:ro
    ports:
      - "8083:80"
      - "9091:9000"
    networks:
      - milton-prism-network
    healthcheck:
      test: ["CMD-SHELL", "curl -so /dev/null http://localhost:80/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      identity-services:
        condition: service_healthy
      repository-services:
        condition: service_healthy
      migration-services:
        condition: service_healthy
    restart: unless-stopped
    stop_grace_period: 30s
    logging: *logging
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 512M
        reservations:
          memory: 128M
    ulimits:
      nofile:
        soft: 65535
        hard: 65535

  # ── Frontend ─────────────────────────────────────────────────────────────────

  frontend:
    build:
      context: ../..
      dockerfile: Dockerfile.frontend
      args:
        VITE_API_BASE_URL: ""
        VITE_API_KEY: "${GATEWAY_API_KEY:?GATEWAY_API_KEY is required}"
    ports:
      - "8080:80"
    networks:
      - milton-prism-network
    healthcheck:
      test: ["CMD-SHELL", "curl -so /dev/null http://localhost:80/"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      milton-prism-gateway:
        condition: service_healthy
    restart: unless-stopped
    stop_grace_period: 10s
    logging: *logging
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 64M
        reservations:
          memory: 16M

  # ── Database ─────────────────────────────────────────────────────────────────

  mongodb:
    image: mongo:7.0
    entrypoint:
      - bash
      - -c
      - "openssl rand -base64 756 > /tmp/mongo.key && chmod 400 /tmp/mongo.key && chown 999:999 /tmp/mongo.key && exec docker-entrypoint.sh mongod --replSet rs0 --bind_ip_all --keyFile /tmp/mongo.key"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: "${MONGO_PASSWORD:?MONGO_PASSWORD is required}"
    ports:
      - "27017:27017"
    volumes:
      - mongodb-data:/data/db
    networks:
      - milton-prism-network
    healthcheck:
      test: ["CMD", "mongosh", "-u", "admin", "-p", "${MONGO_PASSWORD}", "--authenticationDatabase", "admin", "--eval",
             "try { rs.status() } catch(e) { rs.initiate({_id:'rs0',members:[{_id:0,host:'mongodb:27017'}]}) }; db.adminCommand('ping')"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 20s
    restart: unless-stopped
    logging:
      driver: "none"
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1G

  # ── Cache ─────────────────────────────────────────────────────────────────────

  keydb-replica-0:
    image: eqalpha/keydb:latest
    command: >
      keydb-server
        --requirepass "${KEYDB_PASSWORD:?KEYDB_PASSWORD is required}"
        --maxmemory 512mb
        --maxmemory-policy allkeys-lru
        --save 60 1
        --loglevel warning
    healthcheck:
      test: ["CMD", "keydb-cli", "--no-auth-warning", "-a", "${KEYDB_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - cache-network
    ports:
      - "6379:6379"
    volumes:
      - keydb-data:/data
    restart: always
    logging:
      driver: "none"
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 640M

  # ── Observability Stack ───────────────────────────────────────────────────────

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.104.0
    command:
      - "--config=/etc/otel-collector-config.yaml"
      - "--set=service.telemetry.logs.level=error"
    volumes:
      - ../../observability/otel-collector/otel-collector-config.yaml:/etc/otel-collector-config.yaml:ro
    ports:
      - "4317:4317"
      - "4318:4318"
      - "8889:8889"
    networks:
      - milton-prism-network
    restart: unless-stopped
    logging: *logging
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          memory: 128M

  tempo:
    image: grafana/tempo:2.6.0
    command:
      - "-config.file=/etc/tempo.yaml"
      - "-log.level=error"
    volumes:
      - ../../observability/tempo/tempo.yaml:/etc/tempo.yaml:ro
      - tempo-data:/var/tempo
    ports:
      - "3200:3200"
      - "9095:9095"
    networks:
      - milton-prism-network
    restart: unless-stopped
    logging: *logging
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          memory: 128M

  loki:
    image: grafana/loki:3.0.0
    user: "0"
    command:
      - "-config.file=/etc/loki/loki.yaml"
      - "-log.level=error"
    volumes:
      - ../../observability/loki/loki.yaml:/etc/loki/loki.yaml:ro
      - loki-data:/var/loki
    ports:
      - "3100:3100"
    networks:
      - milton-prism-network
    restart: unless-stopped
    logging: *logging
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          memory: 128M

  pyroscope:
    image: grafana/pyroscope:1.10.0
    command:
      - "--log.level=error"
    ports:
      - "4040:4040"
    volumes:
      - pyroscope-data:/var/lib/pyroscope
    networks:
      - milton-prism-network
    restart: unless-stopped
    logging: *logging
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          memory: 128M

  prometheus:
    image: prom/prometheus:v2.52.0
    group_add:
      - "${DOCKER_GID:?DOCKER_GID is required — run: getent group docker | cut -d: -f3}"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ../../observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command:
      - '--log.level=error'
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
      - '--web.enable-lifecycle'
      - '--web.enable-remote-write-receiver'
    ports:
      - "9090:9090"
    networks:
      - milton-prism-network
    restart: unless-stopped
    stop_grace_period: 10s
    logging: *logging
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          memory: 128M

  grafana:
    image: grafana/grafana:11.0.0
    environment:
      GF_SECURITY_ADMIN_USER: "${GF_ADMIN_USER:?GF_ADMIN_USER is required}"
      GF_SECURITY_ADMIN_PASSWORD: "${GF_ADMIN_PASSWORD:?GF_ADMIN_PASSWORD is required}"
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SECURITY_DISABLE_GRAVATAR: "true"
      GF_LOG_LEVEL: error
    volumes:
      - ../../observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "3000:3000"
    networks:
      - milton-prism-network
    restart: unless-stopped
    stop_grace_period: 10s
    logging: *logging
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 256M
        reservations:
          memory: 64M

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.2
    privileged: true
    command:
      - "-logtostderr=true"
      - "-stderrthreshold=2"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:rw
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    ports:
      - "8088:8080"
    networks:
      - milton-prism-network
    restart: unless-stopped
    logging: *logging
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M
        reservations:
          memory: 32M

  node-exporter:
    image: prom/node-exporter:v1.8.1
    pid: host
    network_mode: host
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/rootfs'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
      - '--log.level=error'
    restart: unless-stopped
    logging: *logging
