server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # SPA: all unmatched paths serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # SSE real-time stream: MUST disable proxy buffering and use a long read
    # timeout so the event-stream is relayed frame-by-frame and the connection
    # is held open. This exact-match block takes precedence over the generic
    # /v1/ prefix below.
    location = /v1/events {
        proxy_pass         http://milton-prism-gateway:80;
        proxy_http_version 1.1;
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 3600s;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
    }

    # Proxy API calls to the gateway so the browser never crosses origin
    location /v1/ {
        proxy_pass         http://milton-prism-gateway:80;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
