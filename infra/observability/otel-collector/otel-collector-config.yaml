receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    timeout: 5s
    send_batch_size: 1024

  memory_limiter:
    check_interval: 1s
    limit_mib: 512
    spike_limit_mib: 128

  resourcedetection:
    detectors: [ env, system ]
    timeout: 5s

exporters:
  prometheus:
    endpoint: 0.0.0.0:8889
    namespace: bimtrazer
    send_timestamps: true
    enable_open_metrics: true
    resource_to_telemetry_conversion:
      enabled: true

  otlp/tempo:
    endpoint: tempo:4317
    tls:
      insecure: true

  loki:
    endpoint: http://loki:3100/loki/api/v1/push
    tls:
      insecure: true

  debug:
    verbosity: basic

service:
  telemetry:
    logs:
      level: info
    metrics:
      address: 0.0.0.0:8888

  pipelines:
    traces:
      receivers: [ otlp ]
      processors: [ memory_limiter, resourcedetection, batch ]
      exporters: [ otlp/tempo ]

    metrics:
      receivers: [ otlp ]
      processors: [ memory_limiter, resourcedetection, batch ]
      exporters: [ prometheus ]

    logs:
      receivers: [ otlp ]
      processors: [ memory_limiter, resourcedetection, batch ]
      exporters: [ loki ]
