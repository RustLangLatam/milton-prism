---
global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    environment: local

scrape_configs:

  - job_name: prometheus
    static_configs:
      - targets: [ 'localhost:9090' ]

  # OpenTelemetry Collector metrics (from services via OTLP)
  - job_name: otel_collector
    static_configs:
      - targets: [ 'otel-collector:8889' ]

  # OTel Collector internal metrics
  - job_name: otel_collector_internal
    static_configs:
      - targets: [ 'otel-collector:8888' ]

  # Auto-discover gRPC services via Docker labels:
  #   prometheus.scrape: "true"
  #   prometheus.port: "2112"
  - job_name: grpc_services
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 15s
    relabel_configs:
      - source_labels: [ __meta_docker_container_label_prometheus_scrape ]
        regex: "true"
        action: keep
      - source_labels: [ __meta_docker_network_ip, __meta_docker_container_label_prometheus_port ]
        separator: ":"
        target_label: __address__
      - source_labels: [ __meta_docker_container_name ]
        regex: '/(.*)'
        target_label: instance
      - source_labels: [ __meta_docker_container_label_com_docker_compose_service ]
        target_label: service

  - job_name: cadvisor
    static_configs:
      - targets: [ 'cadvisor:8080' ]

  # node-exporter runs with network_mode: host — reachable via host-gateway
  - job_name: node_exporter
    static_configs:
      - targets: [ 'host.docker.internal:9100' ]

  # Tempo metrics
  - job_name: tempo
    static_configs:
      - targets: [ 'tempo:3200' ]

  # Loki metrics
  - job_name: loki
    static_configs:
      - targets: [ 'loki:3100' ]

  # Pyroscope metrics
  - job_name: pyroscope
    static_configs:
      - targets: [ 'pyroscope:4040' ]
