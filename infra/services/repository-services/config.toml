refreshTokenDuration = 86400
storage              = false
blacklist            = false
validateIssuer       = false
validateAudience     = false

[auth.tokenGenerator.userClaims]
includeUserId       = true
includeUsername     = true
includeUserEmail    = true
includeUserProfiles = false
