version: v2
managed:
  enabled: true
  override:
    - file_option: go_package_prefix
      value: milton_prism/pkg/pb/gen
plugins:
  - local: protoc-gen-openapi
#    out: ../docs
    out: ../milton-prism-panel
    opt:
      - depth=8
      - enum_type=string
      - version=1.0.1-dev
      - default_response=true

    strategy: all
