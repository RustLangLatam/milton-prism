version: v2
modules:
  - path: proto
    lint:
      use:
        - STANDARD
      except:
        - PACKAGE_NO_IMPORT_CYCLE
        - FIELD_NOT_REQUIRED
        # AIP-133/134/135 pattern: RPCs return the resource type directly (User, Empty).
        # buf STANDARD requires unique per-RPC wrapper types, which contradicts the Canon.
        - RPC_RESPONSE_STANDARD_NAME
        - RPC_REQUEST_RESPONSE_UNIQUE
      disallow_comment_ignores: true
      ignore:
        - proto/openapiv3
        - proto/openapi-spec.proto
    breaking:
      use:
        - FILE
      except:
        - EXTENSION_NO_DELETE
        - FIELD_SAME_DEFAULT
deps:
  - buf.build/googleapis/googleapis
  - buf.build/bufbuild/protovalidate:v0.13.0
