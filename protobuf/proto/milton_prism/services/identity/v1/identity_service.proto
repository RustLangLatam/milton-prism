syntax = "proto3";

package milton_prism.services.identity.v1;

import "google/api/annotations.proto";
import "google/api/client.proto";
import "google/api/field_behavior.proto";
import "google/protobuf/empty.proto";
import "google/protobuf/field_mask.proto";
import "milton_prism/types/identity/v1/user.proto";
import "milton_prism/types/pagination/v1/pagination.proto";
import "milton_prism/types/query_params/v1/query_params.proto";
import "milton_prism/types/token/v1/token.proto";
import "openapiv3/annotations.proto";

option cc_enable_arenas = true;
option csharp_namespace = "MiltonPrism.Services.Identity.V1";
option go_package = "milton_prism/pkg/pb/gen/milton_prism/services/identity/v1;identity";
option java_multiple_files = true;
option java_outer_classname = "IdentityServiceProtoV1";
option java_package = "com.miltonprism.services.identity.v1";
option objc_class_prefix = "MPR";

// IdentityService manages User resources and platform authentication.
//
// Standard CRUD methods follow [AIP-130 – 135](https://google.aip.dev/130).
// Authentication and session methods are custom methods per
// [AIP-136](https://google.aip.dev/136).
service IdentityService {
  option (google.api.default_host) = "api.miltonprism.com";

  // ── Standard resource methods ──────────────────────────────────────────────

  // CreateUser creates a new user account.
  //
  // Implements [AIP-133](https://google.aip.dev/133).
  rpc CreateUser(CreateUserRequest) returns (milton_prism.types.identity.v1.User) {
    option (google.api.http) = {
      post: "/v1/users"
      body: "user"
    };
    option (google.api.method_signature) = "user";
    option (openapi.v3.operation) = {
      security: [
        {
          additional_properties: [
            {
              name: "ApiKey"
              value: {
                value: []
              }
            }
          ]
        }
      ]
      responses: {
        response_or_reference: {
          name: "201"
          value: {
            response: {
              description: "User resource created successfully."
              content: {
                additional_properties: {
                  name: "application/json"
                  value: {
                    schema: {
                      reference: {_ref: "#/components/schemas/User"}
                    }
                  }
                }
              }
            }
          }
        }
        response_or_reference: {
          name: "400"
          value: {
            reference: {_ref: "#/components/responses/InvalidArgument"}
          }
        }
        response_or_reference: {
          name: "401"
          value: {
            reference: {_ref: "#/components/responses/Unauthorized"}
          }
        }
        response_or_reference: {
          name: "409"
          value: {
            reference: {_ref: "#/components/responses/AlreadyExists"}
          }
        }
        response_or_reference: {
          name: "500"
          value: {
            reference: {_ref: "#/components/responses/InternalError"}
          }
        }
      }
    };
  }

  // GetUser retrieves a user by its numeric identifier.
  //
  // Callers must be authenticated. Non-system users may only fetch their own
  // record; system users may fetch any record.
  //
  // Implements [AIP-131](https://google.aip.dev/131).
  rpc GetUser(GetUserRequest) returns (milton_prism.types.identity.v1.User) {
    option (google.api.http) = {get: "/v1/users/{identifier}"};
    option (google.api.method_signature) = "identifier";
    option (openapi.v3.operation) = {
      security: [
        {
          additional_properties: [
            {
              name: "ApiKey"
              value: {
                value: []
              }
            },
            {
              name: "Authorization"
              value: {
                value: []
              }
            }
          ]
        }
      ]
      responses: {
        response_or_reference: {
          name: "200"
          value: {
            response: {
              description: "User resource retrieved successfully."
              content: {
                additional_properties: {
                  name: "application/json"
                  value: {
                    schema: {
                      reference: {_ref: "#/components/schemas/User"}
                    }
                  }
                }
              }
            }
          }
        }
        response_or_reference: {
          name: "400"
          value: {
            reference: {_ref: "#/components/responses/InvalidArgument"}
          }
        }
        response_or_reference: {
          name: "401"
          value: {
            reference: {_ref: "#/components/responses/Unauthorized"}
          }
        }
        response_or_reference: {
          name: "403"
          value: {
            reference: {_ref: "#/components/responses/ForbiddenPermission"}
          }
        }
        response_or_reference: {
          name: "404"
          value: {
            reference: {_ref: "#/components/responses/NotFound"}
          }
        }
        response_or_reference: {
          name: "500"
          value: {
            reference: {_ref: "#/components/responses/InternalError"}
          }
        }
      }
    };
  }

  // ListUsers returns a paginated, filterable list of user records.
  //
  // Requires system-user privileges.
  //
  // Implements [AIP-132](https://google.aip.dev/132).
  rpc ListUsers(ListUsersRequest) returns (ListUsersResponse) {
    option (google.api.http) = {get: "/v1/users"};
    option (openapi.v3.operation) = {
      security: [
        {
          additional_properties: [
            {
              name: "ApiKey"
              value: {
                value: []
              }
            },
            {
              name: "Authorization"
              value: {
                value: []
              }
            }
          ]
        }
      ]
      responses: {
        response_or_reference: {
          name: "200"
          value: {
            response: {
              description: "Paginated list of user resources."
              content: {
                additional_properties: {
                  name: "application/json"
                  value: {
                    schema: {
                      reference: {_ref: "#/components/schemas/ListUsersResponse"}
                    }
                  }
                }
              }
            }
          }
        }
        response_or_reference: {
          name: "401"
          value: {
            reference: {_ref: "#/components/responses/Unauthorized"}
          }
        }
        response_or_reference: {
          name: "403"
          value: {
            reference: {_ref: "#/components/responses/ForbiddenPermission"}
          }
        }
        response_or_reference: {
          name: "500"
          value: {
            reference: {_ref: "#/components/responses/InternalError"}
          }
        }
      }
    };
  }

  // UpdateUser applies a FieldMask-bounded partial update to a user record.
  //
  // Non-system users may only update their own record. Omitting update_mask
  // updates all mutable fields.
  //
  // Implements [AIP-134](https://google.aip.dev/134).
  rpc UpdateUser(UpdateUserRequest) returns (milton_prism.types.identity.v1.User) {
    option (google.api.http) = {
      patch: "/v1/users/{user.identifier}"
      body: "user"
    };
    option (google.api.method_signature) = "user,update_mask";
    option (openapi.v3.operation) = {
      security: [
        {
          additional_properties: [
            {
              name: "ApiKey"
              value: {
                value: []
              }
            },
            {
              name: "Authorization"
              value: {
                value: []
              }
            }
          ]
        }
      ]
      responses: {
        response_or_reference: {
          name: "200"
          value: {
            response: {
              description: "User resource updated successfully."
              content: {
                additional_properties: {
                  name: "application/json"
                  value: {
                    schema: {
                      reference: {_ref: "#/components/schemas/User"}
                    }
                  }
                }
              }
            }
          }
        }
        response_or_reference: {
          name: "400"
          value: {
            reference: {_ref: "#/components/responses/InvalidArgument"}
          }
        }
        response_or_reference: {
          name: "401"
          value: {
            reference: {_ref: "#/components/responses/Unauthorized"}
          }
        }
        response_or_reference: {
          name: "403"
          value: {
            reference: {_ref: "#/components/responses/ForbiddenPermission"}
          }
        }
        response_or_reference: {
          name: "404"
          value: {
            reference: {_ref: "#/components/responses/NotFound"}
          }
        }
        response_or_reference: {
          name: "500"
          value: {
            reference: {_ref: "#/components/responses/InternalError"}
          }
        }
      }
    };
  }

  // DeleteUser soft-deletes a user account.
  //
  // The record is retained with state USER_STATE_DELETED until a purge runs.
  // Non-system users may only delete their own account.
  //
  // Implements [AIP-135](https://google.aip.dev/135).
  rpc DeleteUser(DeleteUserRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {delete: "/v1/users/{identifier}"};
    option (google.api.method_signature) = "identifier";
    option (openapi.v3.operation) = {
      security: [
        {
          additional_properties: [
            {
              name: "ApiKey"
              value: {
                value: []
              }
            },
            {
              name: "Authorization"
              value: {
                value: []
              }
            }
          ]
        }
      ]
      responses: {
        response_or_reference: {
          name: "204"
          value: {
            response: {description: "User soft-deleted successfully. No content returned."}
          }
        }
        response_or_reference: {
          name: "400"
          value: {
            reference: {_ref: "#/components/responses/InvalidArgument"}
          }
        }
        response_or_reference: {
          name: "401"
          value: {
            reference: {_ref: "#/components/responses/Unauthorized"}
          }
        }
        response_or_reference: {
          name: "403"
          value: {
            reference: {_ref: "#/components/responses/ForbiddenPermission"}
          }
        }
        response_or_reference: {
          name: "404"
          value: {
            reference: {_ref: "#/components/responses/NotFound"}
          }
        }
        response_or_reference: {
          name: "500"
          value: {
            reference: {_ref: "#/components/responses/InternalError"}
          }
        }
      }
    };
  }

  // ── Custom authentication methods (AIP-136) ────────────────────────────────

  // AuthenticateUser validates email/password credentials and returns a token pair.
  //
  // No prior authentication required. Returns AuthTokens on success.
  //
  // Implements [AIP-136](https://google.aip.dev/136).
  rpc AuthenticateUser(AuthenticateUserRequest) returns (milton_prism.types.token.v1.AuthorizationTokens) {
    option (google.api.http) = {
      post: "/v1/users:authenticate"
      body: "*"
    };
    option (openapi.v3.operation) = {
      security: [
        {
          additional_properties: [
            {
              name: "ApiKey"
              value: {
                value: []
              }
            }
          ]
        }
      ] /* No bearer token required — this is the credential exchange endpoint */
      responses: {
        response_or_reference: {
          name: "200"
          value: {
            response: {
              description: "Authentication successful. Returns access and refresh tokens."
              content: {
                additional_properties: {
                  name: "application/json"
                  value: {
                    schema: {
                      reference: {_ref: "#/components/schemas/AuthorizationTokens"}
                    }
                  }
                }
              }
            }
          }
        }
        response_or_reference: {
          name: "400"
          value: {
            reference: {_ref: "#/components/responses/InvalidArgument"}
          }
        }
        response_or_reference: {
          name: "401"
          value: {
            reference: {_ref: "#/components/responses/Unauthorized"}
          }
        }
        response_or_reference: {
          name: "403"
          value: {
            reference: {_ref: "#/components/responses/ForbiddenPermission"}
          }
        }
        response_or_reference: {
          name: "500"
          value: {
            reference: {_ref: "#/components/responses/InternalError"}
          }
        }
      }
    };
  }

  // RefreshToken issues a new access/refresh token pair from a valid refresh token.
  //
  // The old refresh token is revoked atomically. No bearer token in the
  // Authorization header is required; the refresh token itself is the credential.
  //
  // Implements [AIP-136](https://google.aip.dev/136).
  rpc RefreshToken(RefreshTokenRequest) returns (milton_prism.types.token.v1.AuthorizationTokens) {
    option (google.api.http) = {
      post: "/v1/users:refreshToken"
      body: "*"
    };
    option (openapi.v3.operation) = {
      security: [
        {
          additional_properties: [
            {
              name: "ApiKey"
              value: {
                value: []
              }
            }
          ]
        }
      ] /* Refresh token is sent in the request body, not as a bearer header */
      responses: {
        response_or_reference: {
          name: "200"
          value: {
            response: {
              description: "Token rotated successfully. Returns a new access/refresh token pair."
              content: {
                additional_properties: {
                  name: "application/json"
                  value: {
                    schema: {
                      reference: {_ref: "#/components/schemas/AuthorizationTokens"}
                    }
                  }
                }
              }
            }
          }
        }
        response_or_reference: {
          name: "400"
          value: {
            reference: {_ref: "#/components/responses/InvalidArgument"}
          }
        }
        response_or_reference: {
          name: "401"
          value: {
            reference: {_ref: "#/components/responses/Unauthorized"}
          }
        }
        response_or_reference: {
          name: "500"
          value: {
            reference: {_ref: "#/components/responses/InternalError"}
          }
        }
      }
    };
  }

  // Logout invalidates the caller's current session and revokes the access token.
  //
  // Requires a valid bearer token in the Authorization header.
  //
  // Implements [AIP-136](https://google.aip.dev/136).
  rpc Logout(LogoutRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      post: "/v1/users:logout"
      body: "*"
    };
    option (openapi.v3.operation) = {
      security: [
        {
          additional_properties: [
            {
              name: "ApiKey"
              value: {
                value: []
              }
            },
            {
              name: "Authorization"
              value: {
                value: []
              }
            }
          ]
        }
      ]
      responses: {
        response_or_reference: {
          name: "200"
          value: {
            response: {description: "Session invalidated successfully. No content returned."}
          }
        }
        response_or_reference: {
          name: "401"
          value: {
            reference: {_ref: "#/components/responses/Unauthorized"}
          }
        }
        response_or_reference: {
          name: "500"
          value: {
            reference: {_ref: "#/components/responses/InternalError"}
          }
        }
      }
    };
  }

  // GetCurrentUser returns the profile of the authenticated caller.
  //
  // Equivalent to GetUser(caller_id) without requiring the client to know its
  // own identifier.
  //
  // Implements [AIP-136](https://google.aip.dev/136).
  rpc GetCurrentUser(GetCurrentUserRequest) returns (milton_prism.types.identity.v1.User) {
    option (google.api.http) = {get: "/v1/users:current"};
    option (openapi.v3.operation) = {
      security: [
        {
          additional_properties: [
            {
              name: "ApiKey"
              value: {
                value: []
              }
            },
            {
              name: "Authorization"
              value: {
                value: []
              }
            }
          ]
        }
      ]
      responses: {
        response_or_reference: {
          name: "200"
          value: {
            response: {
              description: "Authenticated caller's user profile."
              content: {
                additional_properties: {
                  name: "application/json"
                  value: {
                    schema: {
                      reference: {_ref: "#/components/schemas/User"}
                    }
                  }
                }
              }
            }
          }
        }
        response_or_reference: {
          name: "401"
          value: {
            reference: {_ref: "#/components/responses/Unauthorized"}
          }
        }
        response_or_reference: {
          name: "404"
          value: {
            reference: {_ref: "#/components/responses/NotFound"}
          }
        }
        response_or_reference: {
          name: "500"
          value: {
            reference: {_ref: "#/components/responses/InternalError"}
          }
        }
      }
    };
  }
}

// ── Request / Response messages ────────────────────────────────────────────────

// CreateUserRequest carries the new user's data and initial password.
message CreateUserRequest {
  // User resource to create. The identifier field is ignored; it is assigned by the server.
  milton_prism.types.identity.v1.User user = 1 [
    (google.api.field_behavior) = REQUIRED,
    (openapi.v3.property) = {description: "User resource payload. The identifier field is server-assigned and ignored on input."}
  ];

  // Plain-text password chosen by the user. Never stored; hashed on the server before persistence.
  string password = 2 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.field_behavior) = INPUT_ONLY,
    (openapi.v3.property) = {
      description: "Plain-text initial password. Transmitted over TLS only. Never persisted or returned."
      example: {yaml: "Str0ngP@ssw0rd!"}
      format: "password"
      min_length: 8
      max_length: 72
      pattern: "^(?=.*[a-z])(?=.*[A-Z])(?=.*\\d)(?=.*[\\W_]).{8,72}$"
    }
  ];
}

// GetUserRequest identifies the user to retrieve.
message GetUserRequest {
  // Numeric identifier of the user to retrieve.
  uint64 identifier = 1 [
    (google.api.field_behavior) = REQUIRED,
    (openapi.v3.property) = {
      description: "Numeric identifier of the user to retrieve."
      example: {yaml: "'100001'"}
      format: "uint64"
    }
  ];
}

// ListUsersRequest supports optional filtering and pagination.
message ListUsersRequest {
  // Optional filter criteria to narrow the result set.
  milton_prism.types.identity.v1.UsersFilter filter = 1 [
    (google.api.field_behavior) = OPTIONAL,
    (openapi.v3.property) = {description: "Optional filter criteria (state, email). Omit to return all users."}
  ];

  // Pagination parameters controlling page number, size, and sort order.
  milton_prism.types.query_params.v1.PageQueryParams page_params = 2 [
    (google.api.field_behavior) = OPTIONAL,
    (openapi.v3.property) = {description: "Pagination and sort parameters. Defaults to page 1, size 10, descending by create_time."}
  ];
}

// ListUsersResponse wraps a page of users with pagination metadata.
message ListUsersResponse {
  // The page of user resources matching the request filter.
  repeated milton_prism.types.identity.v1.User users = 1 [(openapi.v3.property) = {description: "Page of user resources matching the applied filter."}];

  // Pagination metadata (total count, current page, total pages).
  milton_prism.types.pagination.v1.Pagination pagination = 2 [(openapi.v3.property) = {description: "Pagination metadata describing the total result set and current page position."}];
}

// UpdateUserRequest applies a FieldMask-bounded partial update.
message UpdateUserRequest {
  // User resource carrying the updated field values. The identifier field must be set.
  milton_prism.types.identity.v1.User user = 1 [
    (google.api.field_behavior) = REQUIRED,
    (openapi.v3.property) = {description: "User resource with updated values. identifier must be set to identify the target record."}
  ];

  // Specifies which fields to update. Follows [AIP-134](https://google.aip.dev/134).
  // An empty mask causes all mutable fields to be replaced.
  google.protobuf.FieldMask update_mask = 2 [
    (google.api.field_behavior) = REQUIRED,
    (openapi.v3.property) = {
      description: "Comma-separated list of field paths to update (e.g. 'display_name,state'). An empty mask updates all mutable fields."
      example: {yaml: "display_name,state"}
    }
  ];
}

// DeleteUserRequest identifies the account to soft-delete.
message DeleteUserRequest {
  // Numeric identifier of the user to delete.
  uint64 identifier = 1 [
    (google.api.field_behavior) = REQUIRED,
    (openapi.v3.property) = {
      description: "Numeric identifier of the user to soft-delete."
      example: {yaml: "'100001'"}
      format: "uint64"
    }
  ];
}

// AuthenticateUserRequest carries the credentials for password-based login.
message AuthenticateUserRequest {
  // Registered email address of the user attempting to authenticate.
  string email = 1 [
    (google.api.field_behavior) = REQUIRED,
    (openapi.v3.property) = {
      description: "Registered email address."
      example: {yaml: "alice@example.com"}
      format: "email"
    }
  ];

  // Plain-text password. Transmitted over TLS only; never logged or stored.
  string password = 2 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.field_behavior) = INPUT_ONLY,
    (openapi.v3.property) = {
      description: "Plain-text password. Transmitted over TLS only. Never logged or persisted."
      example: {yaml: "Str0ngP@ssw0rd!"}
      format: "password"
      min_length: 8
      max_length: 72
    }
  ];
}

// RefreshTokenRequest carries the long-lived refresh token to be rotated.
message RefreshTokenRequest {
  // The refresh token previously issued by AuthenticateUser or RefreshToken.
  string refresh_token = 1 [
    (google.api.field_behavior) = REQUIRED,
    (openapi.v3.property) = {
      description: "Refresh token previously issued by AuthenticateUser or RefreshToken. Valid for one use; a new pair is issued on success."
      example: {yaml: "v2.local.QAxIpVe-ECVNI1z4xQbm..."}
      format: "JWT"
    }
  ];
}

// LogoutRequest is intentionally empty; session context is read from the bearer token.
message LogoutRequest {}

// GetCurrentUserRequest is intentionally empty; the caller identity is derived from the bearer token.
message GetCurrentUserRequest {}
