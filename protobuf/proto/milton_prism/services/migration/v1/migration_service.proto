syntax = "proto3";

package milton_prism.services.migration.v1;

import "google/api/annotations.proto";
import "google/api/field_behavior.proto";
import "google/api/httpbody.proto";
import "google/protobuf/empty.proto";
import "milton_prism/types/migration/v1/migration.proto";
import "milton_prism/types/pagination/v1/pagination.proto";
import "milton_prism/types/query_params/v1/query_params.proto";
import "openapiv3/annotations.proto";

option cc_enable_arenas = true;
option csharp_namespace = "MiltonPrism.Services.Migration.V1";
option go_package = "milton_prism/pkg/pb/gen/milton_prism/services/migration/v1;migrationsvcv1";
option java_multiple_files = true;
option java_outer_classname = "MigrationServiceProtoV1";
option java_package = "com.miltonprism.services.migration.v1";
option objc_class_prefix = "MPR";

// MigrationService owns the Migration aggregate and enforces valid state
// transitions through its state machine.
//
// The actual analysis, design, code generation, and testing work is driven by
// the orchestrator engine — this service guards the record and valid transitions.
// All RPCs require bearer-token authentication.
// Standard CRUD methods follow AIP-130 – 135.
// Custom state-transition methods follow AIP-136.
service MigrationService {
  // CreateMigration creates a new migration record in PENDING state.
  //
  // The migration is not started automatically; call StartMigration to
  // trigger the pipeline.
  rpc CreateMigration(CreateMigrationRequest) returns (milton_prism.types.migration.v1.Migration) {
    option (google.api.http) = {
      post: "/v1/migrations"
      body: "migration"
    };
    option (openapi.v3.operation) = {
      summary: "Create a migration"
      description: "Creates a new migration record in PENDING state. Call StartMigration to begin the pipeline."
    };
  }

  // GetMigration returns a migration by its numeric identifier.
  //
  // Only the owner or a system user may retrieve the record.
  rpc GetMigration(GetMigrationRequest) returns (milton_prism.types.migration.v1.Migration) {
    option (google.api.http) = {get: "/v1/migrations/{identifier}"};
    option (openapi.v3.operation) = {
      summary: "Get a migration"
      description: "Returns a migration by numeric identifier. Only the owner or a system user may call this."
    };
  }

  // ListMigrations returns a paginated list of migrations.
  //
  // Non-system callers see only their own migrations.
  rpc ListMigrations(ListMigrationsRequest) returns (ListMigrationsResponse) {
    option (google.api.http) = {get: "/v1/migrations"};
    option (openapi.v3.operation) = {
      summary: "List migrations"
      description: "Returns a paginated, filtered list. Non-system callers see only their own migrations."
    };
  }

  // DeleteMigration soft-deletes a migration by identifier.
  //
  // Only migrations in a terminal state (PUSHED, FAILED, CANCELLED) may be
  // deleted. The record is retained until the purge window expires.
  rpc DeleteMigration(DeleteMigrationRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {delete: "/v1/migrations/{identifier}"};
    option (openapi.v3.operation) = {
      summary: "Soft-delete a migration"
      description: "Marks a terminal-state migration as deleted. Record retained until purge window expires."
    };
  }

  // StartMigration transitions a migration from PENDING to ANALYZING and
  // signals the orchestrator to begin the pipeline.
  //
  // Only the owner or a system user may start a migration.
  rpc StartMigration(StartMigrationRequest) returns (milton_prism.types.migration.v1.Migration) {
    option (google.api.http) = {
      post: "/v1/migrations/{identifier}:start"
      body: "*"
    };
    option (openapi.v3.operation) = {
      summary: "Start the migration pipeline"
      description: "Transitions the migration from PENDING to ANALYZING and signals the orchestrator."
    };
  }

  // RunMigration executes the full restructuring roadmap end-to-end from the
  // platform in a single shot, with no intermediate manual steps.
  //
  // It is the one-shot orchestration trigger: from the migration's current
  // state it kicks off the pipeline (PENDING starts analysis) and records an
  // auto-approve intent so that, the moment decomposition reaches
  // AWAITING_APPROVAL, the design plan is approved automatically and generation
  // begins — without a human approval click. When the migration is already at
  // AWAITING_APPROVAL the plan is approved immediately.
  //
  // The final publish (git push) is NEVER automated: the run drives the
  // migration only as far as READY (or FAILED). The migrability gate still
  // applies — a NOT_MIGRABLE verdict without an override blocks the
  // auto-approval, just like a manual ApproveDesign.
  //
  // Idempotent: re-running from a state that is already in flight is a no-op
  // that re-asserts the auto-approve intent. Only the owner or a system user
  // may call this.
  rpc RunMigration(RunMigrationRequest) returns (milton_prism.types.migration.v1.Migration) {
    option (google.api.http) = {
      post: "/v1/migrations/{identifier}:run"
      body: "*"
    };
    option (openapi.v3.operation) = {
      summary: "Run the full roadmap end-to-end from the platform"
      description: "One-shot orchestration: starts the pipeline and auto-approves the plan when design completes so analysis → design → generation runs without manual steps. Stops at READY; never auto-publishes. The migrability gate still blocks a NOT_MIGRABLE verdict without an override."
    };
  }

  // ApproveDesign transitions a migration from AWAITING_APPROVAL.
  //
  // When approved is true the migration advances to GENERATING.
  // When approved is false the migration is set to CANCELLED.
  // Only the owner or a system user may approve or reject.
  rpc ApproveDesign(ApproveDesignRequest) returns (milton_prism.types.migration.v1.Migration) {
    option (google.api.http) = {
      post: "/v1/migrations/{identifier}:approveDesign"
      body: "*"
    };
    option (openapi.v3.operation) = {
      summary: "Approve or reject the restructure plan"
      description: "Advances to GENERATING when approved=true, or sets CANCELLED when approved=false."
    };
  }

  // GetGenerationPackage assembles and returns the full generation package for a
  // GENERATING migration: proto contracts, boundary specs, and profile metadata
  // for every proposed service.
  //
  // Only available when the migration is in GENERATING state. Only the owner or
  // a system user may call this.
  rpc GetGenerationPackage(GetGenerationPackageRequest) returns (milton_prism.types.migration.v1.GenerationPackage) {
    option (google.api.http) = {
      post: "/v1/migrations/{identifier}:generationPackage"
      body: "*"
    };
    option (openapi.v3.operation) = {
      summary: "Get generation package"
      description: "Returns the full generation package (proto + boundary spec per service) for a GENERATING migration."
    };
  }

  // CancelMigration transitions a migration to CANCELLED from any non-terminal
  // state.
  //
  // Only the owner or a system user may cancel a migration.
  rpc CancelMigration(CancelMigrationRequest) returns (milton_prism.types.migration.v1.Migration) {
    option (google.api.http) = {
      post: "/v1/migrations/{identifier}:cancel"
      body: "*"
    };
    option (openapi.v3.operation) = {
      summary: "Cancel a migration"
      description: "Transitions the migration to CANCELLED from any non-terminal state."
    };
  }

  // PublishMigration reads all generated artifacts and pushes them to a target
  // git repository. Callable from READY or PUSHED state.
  //
  // On success: transitions to PUSHED and returns the updated migration.
  // On push failure (auth/conflict/network): the migration stays in its current
  // state (READY is retryable) and a typed error is returned. The write token
  // is never stored, logged, or included in any error message.
  // Only the owner or a system user may publish.
  rpc PublishMigration(PublishMigrationRequest) returns (PublishMigrationResponse) {
    option (google.api.http) = {
      post: "/v1/migrations/{migration_id}:publish"
      body: "*"
    };
    option (openapi.v3.operation) = {
      summary: "Publish migration artifacts to a git repository"
      description: "Commits all generated artifacts and pushes them to the target repository. On push failure the migration stays READY (retryable). The write token is never stored."
    };
  }

  // AssessMigrability runs the opt-in LLM migrability assessment for a migration.
  //
  // Requires the migration to have a completed analysis (analysis_summary_id > 0).
  // Costs tokens — the caller explicitly requests this. Re-running updates the stored verdict.
  // Returns the updated migration with the migrability_assessment field populated.
  // Only the owner or a system user may call this.
  rpc AssessMigrability(AssessMigrabilityRequest) returns (milton_prism.types.migration.v1.Migration) {
    option (google.api.http) = {
      post: "/v1/migrations/{identifier}:assessMigrability"
      body: "*"
    };
    option (openapi.v3.operation) = {
      summary: "Run migrability assessment"
      description: "Triggers an opt-in LLM assessment of migration readiness. Costs tokens. Updates the stored verdict on every call. Requires completed analysis."
    };
  }

  // SetMigrabilityOverride sets or clears the migrability override flag.
  //
  // When override is true, a NOT_MIGRABLE verdict no longer blocks Approve/Generate.
  // The user explicitly accepts the risk by calling this. Idempotent.
  // Only the owner or a system user may call this.
  rpc SetMigrabilityOverride(SetMigrabilityOverrideRequest) returns (milton_prism.types.migration.v1.Migration) {
    option (google.api.http) = {
      post: "/v1/migrations/{identifier}:setMigrabilityOverride"
      body: "*"
    };
    option (openapi.v3.operation) = {
      summary: "Set or clear the migrability override"
      description: "When override=true, lifts the NOT_MIGRABLE block so the user can proceed with generation despite the verdict."
    };
  }

  // GenerateRestructuringRoadmap assembles a restructuring roadmap for a
  // NOT_MIGRABLE or no-boundary migration and transitions it to RESTRUCTURING_READY.
  //
  // The roadmap is assembled synchronously from the persisted MigrabilityAssessment
  // and RestructurePlan — no additional LLM call is made. The migration must be in
  // AWAITING_APPROVAL state and must have either a NOT_MIGRABLE verdict or a plan
  // with no_service_boundaries=true. RESTRUCTURING_READY is a terminal state.
  // Only the owner or a system user may call this.
  rpc GenerateRestructuringRoadmap(GenerateRestructuringRoadmapRequest) returns (milton_prism.types.migration.v1.Migration) {
    option (google.api.http) = {
      post: "/v1/migrations/{identifier}:generateRestructuringRoadmap"
      body: "*"
    };
    option (openapi.v3.operation) = {
      summary: "Generate a restructuring roadmap"
      description: "Assembles a roadmap from the persisted assessment and plan for a NOT_MIGRABLE or no-boundary migration. Transitions to RESTRUCTURING_READY (terminal). No LLM call is made."
    };
  }

  // GetGenerationArtifacts returns the generated source files for a migration.
  //
  // When service_name is empty all services are returned; when non-empty only
  // that service's files are returned.
  // Intentionally separate from GetMigration so that status-polling does not
  // load potentially large code payloads on every call.
  // Only available when the migration is in READY or FAILED state.
  // Only the owner or a system user may call this.
  rpc GetGenerationArtifacts(GetGenerationArtifactsRequest) returns (GetGenerationArtifactsResponse) {
    option (google.api.http) = {
      post: "/v1/migrations/{migration_id}:generationArtifacts"
      body: "*"
    };
    option (openapi.v3.operation) = {
      summary: "Get generated source file artifacts"
      description: "Returns the generated source files for the migration. Leave service_name empty to retrieve all services. Separate from GetMigration to avoid loading code on status polls."
    };
  }

  // EnrichRoadmap runs the opt-in LLM enrichment of the restructuring roadmap steps.
  //
  // Requires the migration to be in RESTRUCTURING_READY state with a non-empty
  // action_plan. Costs tokens — the caller explicitly requests this.
  // Re-running updates the stored enrichment (idempotent).
  // Returns the updated migration with the roadmap.enrichment field populated.
  // Only the owner or a system user may call this.
  rpc EnrichRoadmap(EnrichRoadmapRequest) returns (milton_prism.types.migration.v1.Migration) {
    option (google.api.http) = {
      post: "/v1/migrations/{identifier}:enrichRoadmap"
      body: "*"
    };
    option (openapi.v3.operation) = {
      summary: "Enrich roadmap steps with LLM narratives"
      description: "Triggers opt-in LLM enrichment of the deterministic roadmap steps. Costs tokens. Updates the stored enrichment on every call. Requires RESTRUCTURING_READY state."
    };
  }

  // GenerateBlueprint runs the opt-in LLM blueprint generation for a migration.
  //
  // Requires the migration to be in RESTRUCTURING_READY state with both a
  // roadmap and a completed analysis summary. Loads the full dependency graph
  // and module cards from the analysis database, runs the Distill pipeline,
  // and asks the LLM to propose service groupings anchored to coupling data.
  // Costs tokens (more than EnrichRoadmap due to larger prompt). Re-running
  // updates the stored blueprint (idempotent).
  // Returns the updated migration with the roadmap.blueprint field populated.
  // Only the owner or a system user may call this.
  rpc GenerateBlueprint(GenerateBlueprintRequest) returns (milton_prism.types.migration.v1.Migration) {
    option (google.api.http) = {
      post: "/v1/migrations/{identifier}:generateBlueprint"
      body: "*"
    };
    option (openapi.v3.operation) = {
      summary: "Generate LLM microservice blueprint anchored to dependency graph"
      description: "Triggers opt-in LLM blueprint generation. Loads the full dependency graph and module cards, then proposes service groupings anchored to measured coupling. Costs tokens. Updates the stored blueprint on every call. Requires RESTRUCTURING_READY state with a completed analysis."
    };
  }

  // ExportActionPlanPrompt generates a deterministic Markdown prompt file
  // containing the restructuring action plan enriched with stack-specific
  // "how-to" instructions for the detected framework. No LLM is invoked —
  // the export is instantaneous and free. Requires RESTRUCTURING_READY state
  // with a non-empty action_plan. Only the owner or a system user may call this.
  rpc ExportActionPlanPrompt(ExportActionPlanPromptRequest) returns (google.api.HttpBody) {
    option (google.api.http) = {get: "/v1/migrations/{identifier}:exportActionPlanPrompt"};
    option (openapi.v3.operation) = {
      summary: "Export restructuring action plan as a Markdown agent prompt"
      description: "Returns a deterministic Markdown file (.md) containing the restructuring action plan with stack-specific instructions for the detected framework. No LLM cost. Requires RESTRUCTURING_READY state with a non-empty action_plan."
    };
  }

  // DownloadDeliverable assembles the complete, compilable Go monorepo
  // deliverable (static skeleton + all generated artifacts) and returns it as a
  // ZIP archive. The archive unpacks to a single directory tree with go.mod at
  // the root (no wrapping folder). Callable when the migration is in READY or
  // PUSHED state. Only the owner or a system user may call this.
  rpc DownloadDeliverable(DownloadDeliverableRequest) returns (google.api.HttpBody) {
    option (google.api.http) = {get: "/v1/migrations/{migration_id}:downloadDeliverable"};
    option (openapi.v3.operation) = {
      summary: "Download the compiled deliverable as a ZIP archive"
      description: "Assembles skeleton + generated artifacts into a complete Go monorepo and returns it as application/zip. The ZIP unpacks flat (go.mod at root). Callable in READY or PUSHED state."
      responses: {
        response_or_reference: {
          name: "200"
          value: {
            response: {
              description: "Compiled Go monorepo deliverable as a ZIP archive."
              content: {
                additional_properties: {
                  name: "application/zip"
                  value: {
                    schema: {
                      schema: {
                        type: "string"
                        format: "binary"
                      }
                    }
                  }
                }
              }
            }
          }
        }
      }
    };
  }
}

// CreateMigrationRequest carries a fully populated migration for creation.
// The repository_id and owner_user_id fields are required.
message CreateMigrationRequest {
  // Migration to create. Must include repository_id, owner_user_id, and target.
  milton_prism.types.migration.v1.Migration migration = 1 [
    (google.api.field_behavior) = REQUIRED,
    (openapi.v3.property) = {description: "Migration resource to create."}
  ];
}

// GetMigrationRequest identifies the migration to retrieve.
message GetMigrationRequest {
  // Numeric identifier assigned at creation.
  uint64 identifier = 1 [
    (google.api.field_behavior) = REQUIRED,
    (openapi.v3.property) = {
      description: "Migration identifier."
      example: {yaml: "7"}
    }
  ];
}

// ListMigrationsRequest parameters for a paginated, filtered list.
message ListMigrationsRequest {
  // Optional filter to narrow results.
  milton_prism.types.migration.v1.MigrationsFilter filter = 1 [(openapi.v3.property) = {description: "Optional filter to narrow the migration list."}];
  // Pagination parameters (page_number, page_size).
  milton_prism.types.query_params.v1.PageQueryParams page_params = 2 [(openapi.v3.property) = {description: "Page number and page size parameters."}];
  // Optional AIP-132 ordering directive, e.g. "create_time desc" or "topology asc".
  // The sort is resolved server-side in MongoDB, never on the client. A single
  // field plus an optional "asc"/"desc" direction (default ascending). Allowed
  // fields: create_time, topology, protocol, state, language. An unknown field
  // is rejected with INVALID_ARGUMENT. Empty → "create_time desc".
  string order_by = 3 [(openapi.v3.property) = {
    description: "AIP-132 ordering, e.g. 'create_time desc'. Allowed fields: create_time, topology, protocol, state, language. Default 'create_time desc'. Unknown field → INVALID_ARGUMENT. Sort is server-side."
    example: {yaml: "create_time desc"}
  }];
}

// ListMigrationsResponse carries a page of migrations with pagination metadata.
message ListMigrationsResponse {
  // The migrations on this page.
  repeated milton_prism.types.migration.v1.Migration migrations = 1 [(openapi.v3.property) = {description: "Migrations in this result page."}];
  // Pagination metadata for this result page.
  milton_prism.types.pagination.v1.Pagination pagination = 2 [(openapi.v3.property) = {description: "Pagination metadata."}];
}

// DeleteMigrationRequest identifies the migration to soft-delete.
message DeleteMigrationRequest {
  // Numeric identifier assigned at creation.
  uint64 identifier = 1 [
    (google.api.field_behavior) = REQUIRED,
    (openapi.v3.property) = {
      description: "Migration identifier."
      example: {yaml: "7"}
    }
  ];
}

// StartMigrationRequest initiates the migration pipeline.
message StartMigrationRequest {
  // Numeric identifier assigned at creation.
  uint64 identifier = 1 [
    (google.api.field_behavior) = REQUIRED,
    (openapi.v3.property) = {
      description: "Migration identifier."
      example: {yaml: "7"}
    }
  ];
}

// RunMigrationRequest triggers the single-shot end-to-end roadmap execution.
message RunMigrationRequest {
  // Numeric identifier assigned at creation.
  uint64 identifier = 1 [
    (google.api.field_behavior) = REQUIRED,
    (openapi.v3.property) = {
      description: "Migration identifier."
      example: {yaml: "7"}
    }
  ];

  // Optional allowlist of service names to generate once the plan is
  // auto-approved. Empty = generate all services. Mirrors
  // ApproveDesignRequest.service_filter so a one-shot run can still trial a
  // subset of services.
  repeated string service_filter = 2 [(openapi.v3.property) = {description: "Optional subset of service names to generate when the plan is auto-approved. Empty = generate all."}];
}

// ApproveDesignRequest carries the owner's decision on the restructure plan.
message ApproveDesignRequest {
  // Numeric identifier assigned at creation.
  uint64 identifier = 1 [
    (google.api.field_behavior) = REQUIRED,
    (openapi.v3.property) = {
      description: "Migration identifier."
      example: {yaml: "7"}
    }
  ];
  // True to advance to GENERATING; false to transition to CANCELLED.
  bool approved = 2 [
    (google.api.field_behavior) = REQUIRED,
    (openapi.v3.property) = {
      description: "true advances to GENERATING; false transitions to CANCELLED."
      example: {yaml: "true"}
    }
  ];
  // Optional allowlist of service names to generate. Empty = generate all services.
  // Use this to trial-generate 1–3 services before committing to the full run.
  repeated string service_filter = 3 [(openapi.v3.property) = {description: "Optional subset of service names to generate. Empty = generate all."}];
}

// GetGenerationPackageRequest identifies the migration whose generation package to retrieve.
message GetGenerationPackageRequest {
  // Numeric identifier of the GENERATING migration.
  uint64 identifier = 1 [
    (google.api.field_behavior) = REQUIRED,
    (openapi.v3.property) = {
      description: "Migration identifier."
      example: {yaml: "7"}
    }
  ];
}

// CancelMigrationRequest cancels a non-terminal migration.
message CancelMigrationRequest {
  // Numeric identifier assigned at creation.
  uint64 identifier = 1 [
    (google.api.field_behavior) = REQUIRED,
    (openapi.v3.property) = {
      description: "Migration identifier."
      example: {yaml: "7"}
    }
  ];
}

// PublishMigrationRequest specifies the target for the artifact push.
message PublishMigrationRequest {
  // Numeric migration identifier. Migration must be in READY or PUSHED state.
  uint64 migration_id = 1 [
    (google.api.field_behavior) = REQUIRED,
    (openapi.v3.property) = {
      description: "Migration identifier."
      example: {yaml: "10018"}
    }
  ];
  // URL of the target git repository. Must already exist and accept pushes.
  string target_url = 2 [
    (google.api.field_behavior) = REQUIRED,
    (openapi.v3.property) = {
      description: "Target repository URL. Must exist and be writable."
      example: {yaml: "https://github.com/org/target-repo"}
    }
  ];
  // Write credential for the target. Used once at push time, never stored or logged.
  string write_token = 3 [
    (google.api.field_behavior) = INPUT_ONLY,
    (openapi.v3.property) = {description: "Write token for the target. Never stored or returned."}
  ];
  // Commit message. A standard traceable message is generated when empty.
  string commit_message = 4 [
    (google.api.field_behavior) = OPTIONAL,
    (openapi.v3.property) = {description: "Commit message. Defaults to a generated traceable message."}
  ];
}

// PublishMigrationResponse describes the publish outcome.
message PublishMigrationResponse {
  // Updated migration record. State is PUSHED on success.
  milton_prism.types.migration.v1.Migration migration = 1 [(openapi.v3.property) = {description: "Updated migration record. State is PUSHED on success."}];
  // Branch that received the push (always \"main\" in v1).
  string pushed_branch = 2 [(openapi.v3.property) = {
    description: "Branch that received the push."
    example: {yaml: "main"}
  }];
}

// AssessMigrabilityRequest triggers the opt-in LLM migrability assessment.
message AssessMigrabilityRequest {
  // Numeric identifier of the migration to assess. Must have analysis_summary_id > 0.
  uint64 identifier = 1 [
    (google.api.field_behavior) = REQUIRED,
    (openapi.v3.property) = {
      description: "Migration identifier. Migration must have a completed analysis."
      example: {yaml: "7"}
    }
  ];

  // BCP-47 language tag for the prose fields (summary, reasons, blockers) in
  // the LLM response. Absent or empty → default "en". Module names,
  // identifiers, and i18n keys are never translated regardless of this value.
  string language = 2 [(openapi.v3.property) = {
    description: "BCP-47 language for LLM-generated prose (summary/reasons/blockers). Absent → 'en'. Module names and identifiers are never translated."
    example: {yaml: "de"}
  }];
}

// SetMigrabilityOverrideRequest sets or clears the migrability override flag.
message SetMigrabilityOverrideRequest {
  // Numeric identifier of the migration.
  uint64 identifier = 1 [
    (google.api.field_behavior) = REQUIRED,
    (openapi.v3.property) = {
      description: "Migration identifier."
      example: {yaml: "7"}
    }
  ];

  // When true, lifts a NOT_MIGRABLE block. When false, reinstates it.
  bool override = 2 [
    (google.api.field_behavior) = REQUIRED,
    (openapi.v3.property) = {
      description: "true lifts the NOT_MIGRABLE block; false reinstates it."
      example: {yaml: "true"}
    }
  ];
}

// GetGenerationArtifactsRequest identifies which artifacts to retrieve.
message GetGenerationArtifactsRequest {
  // Numeric migration identifier.
  uint64 migration_id = 1 [
    (google.api.field_behavior) = REQUIRED,
    (openapi.v3.property) = {
      description: "Migration identifier."
      example: {yaml: "10018"}
    }
  ];

  // If non-empty, only artifacts for this service are returned.
  // If empty, artifacts for all services are returned.
  string service_name = 2 [(openapi.v3.property) = {
    description: "Service name to filter by. Leave empty to retrieve all services."
    example: {yaml: "user"}
  }];
}

// GetGenerationArtifactsResponse carries the generated source files grouped by service.
message GetGenerationArtifactsResponse {
  // Per-service generated source files, sorted by service name.
  repeated milton_prism.types.migration.v1.ServiceGenerationArtifacts services = 1 [(openapi.v3.property) = {description: "Generated source files per service, sorted by service name."}];
}

// GenerateRestructuringRoadmapRequest identifies the migration to generate a roadmap for.
// The migration must be in AWAITING_APPROVAL state with a NOT_MIGRABLE verdict
// or a plan with no_service_boundaries=true.
message GenerateRestructuringRoadmapRequest {
  // Numeric identifier of the migration. Must be in AWAITING_APPROVAL state.
  uint64 identifier = 1 [
    (google.api.field_behavior) = REQUIRED,
    (openapi.v3.property) = {
      description: "Migration identifier. Must be in AWAITING_APPROVAL with NOT_MIGRABLE verdict or no_service_boundaries=true."
      example: {yaml: "7"}
    }
  ];
}

// DownloadDeliverableRequest identifies the migration whose deliverable to assemble.
message DownloadDeliverableRequest {
  // Numeric migration identifier. Migration must be in READY or PUSHED state.
  uint64 migration_id = 1 [
    (google.api.field_behavior) = REQUIRED,
    (openapi.v3.property) = {
      description: "Migration identifier. Migration must be in READY or PUSHED state."
      example: {yaml: "10001"}
    }
  ];
}

// EnrichRoadmapRequest triggers the opt-in LLM enrichment of roadmap steps.
message EnrichRoadmapRequest {
  // Numeric identifier of the migration. Must be in RESTRUCTURING_READY state with a non-empty action_plan.
  uint64 identifier = 1 [
    (google.api.field_behavior) = REQUIRED,
    (openapi.v3.property) = {
      description: "Migration identifier. Migration must be in RESTRUCTURING_READY state."
      example: {yaml: "10003"}
    }
  ];
}

// ExportActionPlanPromptRequest identifies the migration whose action plan to export.
message ExportActionPlanPromptRequest {
  // Numeric identifier of the migration. Must be in RESTRUCTURING_READY state
  // with a non-empty restructuring_roadmap.action_plan.
  uint64 identifier = 1 [
    (google.api.field_behavior) = REQUIRED,
    (openapi.v3.property) = {
      description: "Migration identifier. Must be in RESTRUCTURING_READY state with a non-empty action_plan."
      example: {yaml: "10003"}
    }
  ];
}

// GenerateBlueprintRequest triggers the opt-in LLM blueprint generation.
message GenerateBlueprintRequest {
  // Numeric identifier of the migration. Must be in RESTRUCTURING_READY state
  // with a completed analysis (analysis_summary_id > 0) and a non-empty roadmap.
  uint64 identifier = 1 [
    (google.api.field_behavior) = REQUIRED,
    (openapi.v3.property) = {
      description: "Migration identifier. Must be in RESTRUCTURING_READY state with a completed analysis."
      example: {yaml: "10003"}
    }
  ];
}
