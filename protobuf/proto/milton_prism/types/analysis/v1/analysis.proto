syntax = "proto3";

package milton_prism.types.analysis.v1;

import "google/api/field_behavior.proto";
import "google/protobuf/timestamp.proto";
import "milton_prism/types/common/v1/migrability.proto";
import "openapiv3/annotations.proto";

option cc_enable_arenas = true;
option csharp_namespace = "MiltonPrism.Types.Analysis.V1";
option go_package = "milton_prism/pkg/pb/gen/milton_prism/types/analysis/v1;analysisv1";
option java_multiple_files = true;
option java_outer_classname = "AnalysisProtoV1";
option java_package = "com.miltonprism.types.analysis.v1";
option objc_class_prefix = "MPR";

// ========== ANALYSIS TYPES ==========

// AnalysisState is the lifecycle of a code analysis run.
enum AnalysisState {
  // Default — analysis has not started.
  ANALYSIS_STATE_UNSPECIFIED = 0;
  // Analysis engine is actively processing the repository.
  ANALYSIS_STATE_RUNNING = 1;
  // Analysis finished successfully.
  ANALYSIS_STATE_COMPLETED = 2;
  // Analysis failed; see the associated error details.
  ANALYSIS_STATE_FAILED = 3;
  // The repository has multiple distinct project roots (monorepo) and no root
  // has been selected yet. The heavy analysis pipeline did NOT run; root_candidates
  // lists the detected options. The analysis stays in this terminal-until-action
  // state (no retry loop) until the user picks a root via SelectRoot, which
  // re-enqueues the analysis scoped to the chosen root.
  ANALYSIS_STATE_AWAITING_ROOT_SELECTION = 4;
}

// TechnologyStatus reflects how current a detected technology version is.
enum TechnologyStatus {
  // Default unspecified.
  TECHNOLOGY_STATUS_UNSPECIFIED = 0;
  // The detected version is current.
  TECHNOLOGY_STATUS_CURRENT = 1;
  // A newer stable version is available.
  TECHNOLOGY_STATUS_OUTDATED = 2;
  // The version has reached end-of-life and receives no security fixes.
  TECHNOLOGY_STATUS_END_OF_LIFE = 3;
}

// Severity classifies the impact of a detected vulnerability.
enum Severity {
  // Default unspecified.
  SEVERITY_UNSPECIFIED = 0;
  // Informational — low impact.
  SEVERITY_LOW = 1;
  // Moderate impact; should be addressed within a sprint.
  SEVERITY_MEDIUM = 2;
  // High impact; should be addressed urgently.
  SEVERITY_HIGH = 3;
  // Critical impact; requires immediate remediation.
  SEVERITY_CRITICAL = 4;
}

// AnalysisSummary is the output of a code analysis run against a repository.
// It is the primary resource owned by the analysis engine.
message AnalysisSummary {
  option (openapi.v3.schema) = {
    title: "AnalysisSummary"
    description: "Output of a code analysis run: technologies, vulnerabilities, and dependency graph."
  };

  // System-assigned identifier.
  uint64 identifier = 1 [
    (google.api.field_behavior) = IDENTIFIER,
    (openapi.v3.property) = {
      description: "System-assigned unique identifier."
      example: {yaml: "1"}
    }
  ];

  // Identifier of the repository that was analysed.
  uint64 repository_id = 2 [
    (google.api.field_behavior) = REQUIRED,
    (openapi.v3.property) = {
      description: "Identifier of the repository this summary belongs to."
      example: {yaml: "42"}
    }
  ];

  // Identifier of the migration that triggered this analysis run.
  uint64 migration_id = 3 [(openapi.v3.property) = {
    description: "Migration identifier that triggered this run (0 if standalone)."
    example: {yaml: "7"}
  }];

  // Current lifecycle state of the analysis run.
  AnalysisState state = 4 [(openapi.v3.property) = {
    description: "Lifecycle state of the analysis run."
    example: {yaml: "ANALYSIS_STATE_COMPLETED"}
  }];

  // Technologies detected in the repository source code.
  repeated Technology technologies = 5 [(openapi.v3.property) = {description: "Technologies detected during analysis."}];

  // Security vulnerabilities found in dependencies or the code itself.
  repeated Vulnerability vulnerabilities = 6 [(openapi.v3.property) = {description: "Security vulnerabilities detected during analysis."}];

  // Directed dependency graph between modules.
  repeated DependencyEdge dependency_graph = 7 [(openapi.v3.property) = {description: "Directed dependency graph edges between modules."}];

  // Total number of source files scanned.
  uint64 total_files = 8 [(openapi.v3.property) = {
    description: "Total number of source files scanned."
    example: {yaml: "312"}
  }];

  // Total number of source lines scanned.
  uint64 total_lines = 9 [(openapi.v3.property) = {
    description: "Total number of source lines of code scanned."
    example: {yaml: "48200"}
  }];

  // Server-assigned creation timestamp. Immutable after creation.
  google.protobuf.Timestamp create_time = 10 [
    (google.api.field_behavior) = OUTPUT_ONLY,
    (google.api.field_behavior) = IMMUTABLE,
    (openapi.v3.property) = {
      description: "Creation timestamp (server-assigned, immutable)."
      example: {yaml: "2025-01-15T10:30:00Z"}
    }
  ];

  // Server-assigned last modification timestamp.
  google.protobuf.Timestamp update_time = 11 [
    (google.api.field_behavior) = OUTPUT_ONLY,
    (openapi.v3.property) = {
      description: "Last modification timestamp (server-assigned)."
      example: {yaml: "2025-06-01T08:00:00Z"}
    }
  ];

  // Soft-delete timestamp. Present only for logically deleted summaries.
  optional google.protobuf.Timestamp delete_time = 12 [
    (google.api.field_behavior) = OUTPUT_ONLY,
    (openapi.v3.property) = {
      description: "Soft-delete timestamp. Null while active."
      example: {yaml: "null"}
    }
  ];

  // Scheduled hard-delete timestamp after the retention window expires.
  optional google.protobuf.Timestamp purge_time = 13 [
    (google.api.field_behavior) = OUTPUT_ONLY,
    (openapi.v3.property) = {
      description: "Scheduled purge timestamp after retention window."
      example: {yaml: "null"}
    }
  ];

  // Per-module structural cards extracted by the Tier-2 language analyzers.
  repeated ModuleCard module_cards = 14 [(openapi.v3.property) = {description: "Per-module structural cards (functions, classes, routes, state)."}];

  // Flask Blueprint registrations extracted from the Python workspace.
  repeated BlueprintInfo blueprints = 15 [(openapi.v3.property) = {description: "Flask Blueprint registrations (name, file, url_prefix)."}];

  // Domain/infrastructure/test classification of each module in the dependency graph.
  // Computed by the analysis pipeline using the same blueprint-group + fan-in
  // heuristic as the decomposition engine, so architecture documentation can show
  // domain vs. infrastructure separation without running the full decomposition.
  ModuleClassification module_classification = 16 [(openapi.v3.property) = {description: "Domain/infrastructure/test classification of each module in the dependency graph."}];

  // Snapshot of the source repository's remote URL, captured at analysis creation time.
  // Stored so that ListAnalysisSummaries can display the repository without a
  // cross-service lookup — mirrors the same field on Migration.
  string repository_url = 17 [
    (google.api.field_behavior) = OUTPUT_ONLY,
    (openapi.v3.property) = {
      description: "Remote URL of the source repository, snapshotted at analysis creation."
      example: {yaml: "https://github.com/org/my-service"}
    }
  ];

  // Branch that was analysed, resolved at creation time (explicit override or
  // repository default). Empty for analyses created before this field was added.
  string source_branch = 18 [
    (google.api.field_behavior) = OUTPUT_ONLY,
    (openapi.v3.property) = {
      description: "Branch analysed. Empty for analyses predating this field."
      example: {yaml: "develop"}
    }
  ];

  // Git commit SHA that was actually cloned and analysed. Captured from the
  // repository HEAD after clone so it reflects the exact commit, not a branch
  // pointer that may advance after analysis starts.
  // Empty for analyses predating this field.
  string commit_sha = 19 [
    (google.api.field_behavior) = OUTPUT_ONLY,
    (openapi.v3.property) = {
      description: "Exact git commit SHA cloned and analysed. Empty for analyses predating this field."
      example: {yaml: "a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2"}
    }
  ];

  // Deterministic structural migrability score in [0, 100].
  // Computed automatically when the analysis pipeline produces a dependency graph
  // and module classification (i.e. when deep analysis data is available).
  // Absent for Tier-1-only analyses (no graph) or analyses predating this field.
  // Does not require an LLM call — computed at analysis completion.
  milton_prism.types.common.v1.MigrabilityScore migrability_score = 20 [
    (google.api.field_behavior) = OUTPUT_ONLY,
    (openapi.v3.property) = {description: "Deterministic structural migrability score 0–100. Present when deep analysis data is available."}
  ];

  // LLM-produced migrability assessment. Absent until the user explicitly triggers
  // it via the AssessMigrability RPC. Populating this field costs LLM tokens.
  milton_prism.types.common.v1.MigrabilityAssessment migrability_assessment = 21 [
    (google.api.field_behavior) = OUTPUT_ONLY,
    (openapi.v3.property) = {description: "LLM-produced migrability verdict. Absent until explicitly triggered by the user."}
  ];

  // Canonical shared-state hubs: modules with mutable state and weighted fan-in >= 2.
  // Computed by the analysis pipeline using the same rule as the deterministic scorer.
  // Sorted by fan-in descending (worst hub first). The frontend must read this list
  // instead of recomputing from module_cards with its own thresholds.
  repeated SharedStateHub shared_state_hubs = 23 [(openapi.v3.property) = {description: "Canonical shared-state hubs sorted by weighted fan-in descending."}];

  // Identifier of the user who owns this analysis summary.
  // Set at creation time from the caller's identity (standalone run) or from
  // the owning migration's owner_user_id (migration-triggered run).
  // System users (isSystem=true) can read and list summaries across all owners.
  uint64 owner_user_id = 22 [
    (google.api.field_behavior) = OUTPUT_ONLY,
    (openapi.v3.property) = {
      description: "Identifier of the user who owns this analysis summary."
      example: {yaml: "42"}
    }
  ];

  // Number of production (non-test) modules in module_cards. Derived from
  // module_classification.test_modules: a card is production when its module
  // name is NOT in that list. Zero for analyses without classification data
  // (Tier-1-only, pre-classification, or when no module cards were extracted).
  uint32 module_count_production = 24 [(openapi.v3.property) = {
    description: "Count of production (non-test) module cards. Zero when classification is unavailable."
    example: {yaml: "411"}
  }];

  // Number of test modules in module_cards (subset of module_classification.test_modules
  // that also appear in module_cards). Zero when no test modules were detected.
  uint32 module_count_test = 25 [(openapi.v3.property) = {
    description: "Count of test module cards."
    example: {yaml: "161"}
  }];

  // Statically unreachable modules: islands (fan-in = 0 AND fan-out = 0) that
  // carry code but participate in no dependency edge the static analysis could
  // resolve. NOT a claim of dead code — static analysis cannot prove a module is
  // unused; these may be entry points, framework-wired classes, or invoked
  // externally. Excluded from the live set that feeds scoring (a node with no
  // edges cannot cluster) but still counted as production. A repo-hygiene
  // "review" signal, never a structural finding and never scored. Known framework
  // entry points, test islands, and empty package markers are not listed.
  repeated UnreachableModule unreachable_modules = 26 [(openapi.v3.property) = {description: "Modules with code but no statically resolvable references (for review — may be entry points, framework-wired, or invoked externally; not scored)."}];

  // Whether deep (Tier-2) structural analysis produced any output for this repo:
  // true iff at least one detected language yielded a dependency graph or module
  // cards. False means the deep analyzer was unavailable or blind to the layout
  // (e.g. a pre-PSR-4 / global-namespace PHP codebase like CodeIgniter 3), so the
  // repo has no module graph to reason over. This is an EXPLICIT pipeline signal —
  // it is NOT derived from an empty graph or DomainEmpty downstream. Consumers
  // (migrability assessment, UI executive summary) must degrade honestly when this
  // is false rather than treating the empty graph as a real "no domain" finding.
  bool deep_analysis_available = 27 [(openapi.v3.property) = {description: "True iff deep structural analysis (dependency graph / module cards) was produced. False = analyzer unavailable/blind; downstream must degrade honestly, not score."}];

  // Deterministically detected database engine(s) the analysed code talks to.
  // Inferred from drivers/ORM packages (psycopg2/pg → PostgreSQL; mysqli/pdo_mysql/
  // mysql2 → MySQL; mongo* → MongoDB; sqlite3 → SQLite; …), config files (.env
  // DB_CONNECTION, Laravel config/database.php default, DATABASE_URL, Django
  // settings) and the framework default. Never produced by an LLM. Absent (nil) or
  // engines=["unknown"] when no honest signal exists. Computed at analysis time.
  DatabaseDetection database_detection = 28 [(openapi.v3.property) = {description: "Deterministically detected database engine(s) with the evidence behind the detection. Honest 'unknown' when no signal."}];

  // Deterministically classified architectural pattern of the analysed code.
  // A rules-based classifier maps the structural signals the pipeline already
  // computes (domain/infra ratio, layers present, framework, routing topology,
  // clustering quality, structural_fallback) to one canonical pattern with a
  // confidence. Never a pure LLM hallucination — the classifier runs first and the
  // LLM may only confirm it anchored to this evidence. Absent (nil) for Tier-1-only
  // analyses with no structural data to reason over.
  ArchitecturalPattern architectural_pattern = 29 [(openapi.v3.property) = {description: "Deterministically classified architectural pattern (Clean/Hexagonal/Layered/MVC/Modular monolith/Spaghetti) with confidence and the evidence used."}];

  // Intake gate result: an honest, deterministic up-front verdict on whether this
  // repository is something the platform can actually migrate. Two checks:
  //   (1) codebase kind — is this a BACKEND (the only kind the platform migrates
  //       today), or a frontend-only SPA / library / CLI / mobile app?
  //   (2) primary-language support — does the primary detected language have a
  //       Tier-2 analyzer (today: PHP and Python)? Other languages produce no graph.
  // When either check fails the field carries migratable=false plus human-readable
  // warnings, so the report degrades HONESTLY (it says "this isn't migrable yet and
  // here's why") instead of emitting a migrability verdict as if the repo were
  // migrable. Non-blocking: the analysis still completes and Tier-1 facts
  // (technologies, vulnerabilities) are still produced. Always present on summaries
  // produced after this gate was added.
  IntakeAssessment intake_assessment = 30 [(openapi.v3.property) = {description: "Deterministic intake gate: is this a migratable backend in a supported language? Carries codebase_kind, language support, migratable flag, and honest warnings. Non-blocking."}];

  // Deterministic, code-level security findings detected IN the analysed source —
  // distinct from dependency CVEs (those live in `vulnerabilities`). Today: hardcoded
  // credentials / secrets in cleartext (API keys, passwords, tokens, connection
  // strings, private keys, JWTs) found by a pattern + entropy scanner that walks the
  // workspace. Conservative by design (Lesson 11): a finding is recorded only when a
  // concrete secret-shaped value surfaces; obvious placeholders/examples are NOT
  // reported, and each finding carries a confidence. Never produced by an LLM — the
  // scanner is a pure deterministic function of file contents. Empty when nothing was
  // found (an honest zero, never a guess). Additive: scores/verdicts are unaffected.
  repeated SecurityFinding security_findings = 31 [(openapi.v3.property) = {description: "Deterministic code-level security findings (hardcoded secrets/credentials) detected in the analysed source, each with file:line, severity, and confidence. Distinct from dependency CVEs. Empty when clean."}];

  // Repository-relative subdirectory the analysis was scoped to (monorepos).
  // Empty means the whole repository root was analysed. Snapshotted from the
  // triggering migration/request so the report shows what was actually analysed.
  string root_subdirectory = 32 [
    (google.api.field_behavior) = OUTPUT_ONLY,
    (openapi.v3.property) = {
      description: "Repository-relative subdirectory the analysis was scoped to. Empty means the whole repository root."
      example: {yaml: "backend"}
    }
  ];

  // Candidate project-root subdirectories detected after cloning, when the
  // repository contains more than one distinct project root (monorepo) and no
  // root has been selected yet. Repo-relative paths ("" never appears here; an
  // entry like "services/api" is relative to the repository root). Populated
  // only while the analysis is ANALYSIS_STATE_AWAITING_ROOT_SELECTION; empty
  // once a root is chosen (single-root repos always leave this empty). The
  // client presents these to the user, who picks one via SelectRoot.
  repeated string root_candidates = 33 [
    (google.api.field_behavior) = OUTPUT_ONLY,
    (openapi.v3.property) = {description: "Detected candidate project-root subdirectories when the repository has multiple roots and none is selected yet. Repo-relative. Empty for single-root repos or once a root is chosen. The user selects one via SelectRoot."}
  ];
}

// CodebaseKind classifies what kind of project a repository is, deterministically,
// from already-computed analysis signals (frameworks, package ecosystems, routes,
// language mix). The platform migrates BACKEND repositories today; every other kind
// is surfaced honestly so the report does not pretend a non-backend repo is migrable.
enum CodebaseKind {
  // Kind could not be determined with confidence (ambiguous or too little signal).
  CODEBASE_KIND_UNSPECIFIED = 0;
  // Server-side application: web framework, HTTP routes/controllers/handlers, or an
  // API surface. The only kind the platform migrates today.
  CODEBASE_KIND_BACKEND = 1;
  // Frontend-only single-page app or static site (e.g. React/Vue/Angular with no
  // server framework). Not migratable by this platform yet.
  CODEBASE_KIND_FRONTEND = 2;
  // Reusable library / SDK / package — no runnable server, meant to be imported.
  CODEBASE_KIND_LIBRARY = 3;
  // Command-line tool / script — an executable entry point, no server.
  CODEBASE_KIND_CLI = 4;
  // Mobile application (Android / iOS / React Native / Flutter).
  CODEBASE_KIND_MOBILE = 5;
}

// IntakeAssessment is the deterministic up-front gate the analysis pipeline records
// before any migrability judgement. It answers a single honest question — "can the
// platform migrate this repository today?" — and, when the answer is no, says exactly
// why. It never silently degrades: a non-backend repo or an unsupported primary
// language yields migratable=false plus readable warnings, not an empty or misleading
// report. Produced with no LLM call.
message IntakeAssessment {
  option (openapi.v3.schema) = {
    title: "IntakeAssessment"
    description: "Deterministic intake gate: codebase kind, primary-language support, migratable flag, and honest warnings."
  };

  // Detected kind of this codebase (backend, frontend, library, CLI, mobile, or
  // unspecified when too ambiguous). The platform migrates BACKEND today.
  CodebaseKind codebase_kind = 1 [(openapi.v3.property) = {description: "Detected codebase kind. The platform migrates BACKEND today."}];

  // Confidence in the codebase_kind classification, in [0,1]. Lower when the signal
  // mix is ambiguous (e.g. a fullstack repo with both a server framework and a SPA).
  float kind_confidence = 2 [(openapi.v3.property) = {
    description: "Confidence in the codebase_kind classification, in [0,1]."
    example: {yaml: "0.9"}
  }];

  // Primary language detected by the inventory stage (go-enry), e.g. "PHP", "Python",
  // "Java", "JavaScript". The language with the highest backend-weighted signal.
  string primary_language = 3 [(openapi.v3.property) = {
    description: "Primary language detected (go-enry), e.g. PHP, Python, Java."
    example: {yaml: "PHP"}
  }];

  // True when primary_language has a registered Tier-2 analyzer (today: PHP, Python)
  // and therefore can produce a dependency graph. False ⇒ no graph will be built and
  // any migrability verdict would be empty/degraded — surfaced honestly here instead.
  bool language_supported = 4 [(openapi.v3.property) = {
    description: "True when the primary language has a Tier-2 analyzer (PHP/Python today)."
    example: {yaml: "true"}
  }];

  // The languages the platform currently has analyzers for, for the UI to show
  // "supported: PHP, Python". Sorted ascending. Reflects the registry at run time.
  repeated string supported_languages = 5 [(openapi.v3.property) = {description: "Languages with a Tier-2 analyzer at run time (e.g. PHP, Python)."}];

  // The platform's headline intake verdict: true iff this is a BACKEND in a SUPPORTED
  // language — i.e. the platform can actually migrate it. False for non-backend repos
  // or unsupported-language backends. Consumers gate the migrability report on this.
  bool migratable = 6 [(openapi.v3.property) = {
    description: "True iff this is a backend in a supported language (platform can migrate it)."
    example: {yaml: "true"}
  }];

  // Human-readable, specific warnings explaining any intake failure, e.g.
  // "This repository looks like a frontend-only SPA (React), not a backend — the
  // platform only migrates backends today." or "Primary language Java is not supported
  // yet (supported: PHP, Python); no dependency graph was produced." Empty when migratable.
  repeated string warnings = 7 [(openapi.v3.property) = {description: "Specific human-readable warnings explaining any intake failure. Empty when migratable."}];

  // Deterministic evidence strings behind the codebase_kind classification, e.g.
  // "framework: Laravel (web)", "ecosystem: Composer (PHP backend)", "routes: 42",
  // "no server framework; npm-only JS". Lets the report and the LLM anchor to facts.
  repeated string evidence = 8 [(openapi.v3.property) = {description: "Deterministic evidence strings behind the codebase_kind classification."}];
}

// DatabaseEngine enumerates the database engines the analysis can deterministically
// recognise. UNKNOWN is the honest default when no driver/config/ORM signal exists.
enum DatabaseEngine {
  // No engine could be determined (no driver, config, or ORM signal).
  DATABASE_ENGINE_UNSPECIFIED = 0;
  // PostgreSQL (psycopg2, pg, postgres driver, pgsql connection).
  DATABASE_ENGINE_POSTGRESQL = 1;
  // MySQL / MariaDB (mysqli, pdo_mysql, mysql2, mysql-connector, default Laravel).
  DATABASE_ENGINE_MYSQL = 2;
  // MongoDB (mongo, mongoose, pymongo, mongodb driver).
  DATABASE_ENGINE_MONGODB = 3;
  // SQLite (sqlite3, pdo_sqlite, better-sqlite3).
  DATABASE_ENGINE_SQLITE = 4;
  // Microsoft SQL Server (sqlsrv, pdo_sqlsrv, tedious, pyodbc+mssql).
  DATABASE_ENGINE_SQLSERVER = 5;
  // Oracle Database (oci8, cx_oracle, oracledb).
  DATABASE_ENGINE_ORACLE = 6;
  // Redis used as a primary data store (redis, predis, ioredis) — reported only
  // when no relational/document engine is also detected, since Redis is most often
  // a cache rather than the system of record.
  DATABASE_ENGINE_REDIS = 7;
}

// DatabaseDetection records which database engine(s) the analysed code uses and the
// deterministic evidence behind that conclusion. Multiple engines may be present
// (e.g. a primary store plus Redis). Engines is empty and Unknown=true when no
// honest signal was found.
message DatabaseDetection {
  option (openapi.v3.schema) = {
    title: "DatabaseDetection"
    description: "Deterministically detected database engine(s) and the evidence behind the detection."
  };

  // Detected engines, deduplicated and sorted for stable output. Empty when unknown.
  repeated DatabaseEngine engines = 1 [(openapi.v3.property) = {description: "Detected database engines (deduplicated, sorted). Empty when unknown."}];

  // Human-readable engine names matching engines order (e.g. "PostgreSQL", "MySQL").
  // Convenience for report/UI rendering without an enum lookup table.
  repeated string engine_names = 2 [(openapi.v3.property) = {description: "Display names of the detected engines, aligned with engines."}];

  // True when no engine could be determined from drivers, config, or ORM signals.
  // engines is empty in this case. An honest 'I don't know', never a guess.
  bool unknown = 3 [(openapi.v3.property) = {
    description: "True when no database engine signal was found (engines empty)."
    example: {yaml: "false"}
  }];

  // Deterministic evidence strings behind the detection, e.g.
  // "driver: psycopg2", "config: .env DB_CONNECTION=mysql", "orm: Eloquent (Laravel default MySQL)".
  // Empty when unknown. Lets the report and the LLM anchor to facts, not guesses.
  repeated string evidence = 4 [(openapi.v3.property) = {description: "Deterministic evidence strings behind the detection (driver/config/ORM)."}];
}

// ArchitecturalPatternKind enumerates the canonical architectural patterns the
// deterministic classifier can assign. UNSPECIFIED means the classifier had no
// structural data (Tier-1-only) and made no claim.
enum ArchitecturalPatternKind {
  // No structural data to classify (Tier-1-only analysis).
  ARCHITECTURAL_PATTERN_KIND_UNSPECIFIED = 0;
  // Clean Architecture — strong domain core, layered with dependencies pointing inward.
  ARCHITECTURAL_PATTERN_KIND_CLEAN = 1;
  // Hexagonal (Ports & Adapters) — domain isolated behind an explicit adapter/application layer.
  ARCHITECTURAL_PATTERN_KIND_HEXAGONAL = 2;
  // Layered / N-tier — stacked layers (presentation/business/data) with mostly downward calls.
  ARCHITECTURAL_PATTERN_KIND_LAYERED = 3;
  // MVC — framework-driven controllers/models/views with HTTP routing.
  ARCHITECTURAL_PATTERN_KIND_MVC = 4;
  // Modular monolith — several cohesive clusters/modules inside one deployable.
  ARCHITECTURAL_PATTERN_KIND_MODULAR_MONOLITH = 5;
  // Spaghetti / Big ball of mud / Acantilado — no domain layer or no discernible structure.
  ARCHITECTURAL_PATTERN_KIND_SPAGHETTI = 6;
}

// ArchitecturalPattern records the deterministically classified architectural
// pattern of the analysed code plus the confidence and the structural evidence the
// classifier used. The classification runs before any LLM call; the LLM may only
// confirm it, anchored to this evidence.
message ArchitecturalPattern {
  option (openapi.v3.schema) = {
    title: "ArchitecturalPattern"
    description: "Deterministically classified architectural pattern with confidence and the evidence used."
  };

  // Canonical pattern kind assigned by the deterministic classifier.
  ArchitecturalPatternKind kind = 1 [(openapi.v3.property) = {description: "Canonical architectural pattern kind."}];

  // Display name of the pattern (e.g. "MVC", "Spaghetti / Big ball of mud").
  string name = 2 [(openapi.v3.property) = {
    description: "Display name of the classified pattern."
    example: {yaml: "MVC"}
  }];

  // Classifier confidence in [0, 1]. Reflects how unambiguously the structural
  // signals point to this pattern. Lower when the analysis is structurally blind
  // (deep_analysis_available=false) but a framework still implies a likely pattern.
  float confidence = 3 [(openapi.v3.property) = {
    description: "Classifier confidence in [0,1]."
    example: {yaml: "0.82"}
  }];

  // Deterministic evidence strings the classifier weighed, e.g.
  // "framework: Laravel (MVC)", "domain/infra ratio 57%", "3 clusters", "no domain layer".
  // Lets the report and the LLM anchor the pattern to facts.
  repeated string evidence = 4 [(openapi.v3.property) = {description: "Structural evidence strings the classifier used to reach this pattern."}];
}

// SecuritySeverity ranks a code-level security finding by impact. Used for the
// hardcoded-secret scanner: a live cloud/API secret in cleartext is HIGH; a generic
// password/connection-string credential is MEDIUM; a lower-confidence or
// lower-impact match (e.g. a short generic assignment) is LOW.
enum SecuritySeverity {
  // No severity set (default; not emitted for real findings).
  SECURITY_SEVERITY_UNSPECIFIED = 0;
  // Low impact / lower confidence — surfaced for review, not a confirmed leak.
  SECURITY_SEVERITY_LOW = 1;
  // Medium impact — a credential in cleartext (password, generic token, connection
  // string with embedded credentials).
  SECURITY_SEVERITY_MEDIUM = 2;
  // High impact — a recognisably live secret (provider API key, private key, JWT,
  // AWS secret access key) committed in cleartext.
  SECURITY_SEVERITY_HIGH = 3;
}

// SecurityFindingType names the class of code-level security issue detected. v1
// covers hardcoded secrets/credentials; the enum leaves room for additional
// deterministic checks (e.g. missing auth) without a breaking change.
enum SecurityFindingType {
  // Unset.
  SECURITY_FINDING_TYPE_UNSPECIFIED = 0;
  // A secret/credential embedded in cleartext in source or committed config: a
  // provider API key, password, token, private key, JWT, or a connection string
  // carrying credentials (e.g. mysql://user:pass@host).
  SECURITY_FINDING_TYPE_HARDCODED_SECRET = 1;
}

// SecurityFinding is one deterministic, code-level security issue found IN the
// analysed source (not a dependency CVE — those are Vulnerabilities). It is anchored
// to a concrete file:line with the matched snippet redacted, a severity, and a
// confidence so the report can degrade honestly on ambiguous matches. Produced by a
// pure pattern + entropy scanner, never by an LLM.
message SecurityFinding {
  option (openapi.v3.schema) = {
    title: "SecurityFinding"
    description: "A deterministic code-level security finding (e.g. a hardcoded secret) with file:line, severity, and confidence."
  };

  // The class of finding (today: hardcoded secret/credential).
  SecurityFindingType type = 1 [(openapi.v3.property) = {description: "Class of the security finding."}];

  // Severity of the finding (LOW/MEDIUM/HIGH).
  SecuritySeverity severity = 2 [(openapi.v3.property) = {description: "Severity of the finding (LOW/MEDIUM/HIGH)."}];

  // Workspace-relative path of the file the finding was detected in.
  string file = 3 [(openapi.v3.property) = {
    description: "Workspace-relative file path of the finding."
    example: {yaml: "config/database.php"}
  }];

  // 1-based line number of the finding within the file.
  uint32 line = 4 [(openapi.v3.property) = {
    description: "1-based line number of the finding."
    example: {yaml: "42"}
  }];

  // A short, human-readable description of what was found and why it is a finding,
  // e.g. "Hardcoded AWS secret access key" or "Hardcoded password in connection string".
  string description = 5 [(openapi.v3.property) = {
    description: "Human-readable description of the finding."
    example: {yaml: "Hardcoded AWS secret access key"}
  }];

  // The matched line with the secret value REDACTED (the sensitive token is masked,
  // never echoed in full) so the report can show context without leaking the secret.
  string snippet = 6 [(openapi.v3.property) = {
    description: "The matched line with the secret value redacted."
    example: {yaml: "aws_secret_access_key = \"AKIA****REDACTED****\""}
  }];

  // The rule/detector that fired (e.g. "aws-secret-key", "private-key-pem",
  // "generic-password", "db-connection-string"). Stable identifier for the UI.
  string rule = 7 [(openapi.v3.property) = {
    description: "Identifier of the detector rule that fired."
    example: {yaml: "aws-secret-key"}
  }];

  // Confidence in [0,1] that this is a real secret rather than a placeholder/example.
  // Lower for generic/entropy-only matches; near 1.0 for provider-prefixed keys.
  float confidence = 8 [(openapi.v3.property) = {
    description: "Confidence in [0,1] that this is a real secret (not a placeholder)."
    example: {yaml: "0.95"}
  }];
}

// UnreachableModule is a module the static analysis could not link to the rest of
// the system: it defines functions or classes yet has no incoming or outgoing
// dependency edges. For review, not deletion — it may be an entry point,
// framework-wired, or invoked externally. loc helps prioritise the review.
message UnreachableModule {
  option (openapi.v3.schema) = {
    title: "UnreachableModule"
    description: "A module with code but no statically resolvable references (for review, not deletion)."
  };

  // Fully-qualified module name.
  string module = 1 [(openapi.v3.property) = {
    description: "Fully-qualified module name."
    example: {yaml: "backend.legacy_copy"}
  }];

  // Workspace-relative file path.
  string file = 2 [(openapi.v3.property) = {
    description: "Workspace-relative file path."
    example: {yaml: "backend/legacy_copy.py"}
  }];

  // Lines of code in the file — for prioritising the review.
  uint32 loc = 3 [(openapi.v3.property) = {
    description: "Lines of code in the file."
    example: {yaml: "240"}
  }];
}

// Technology describes a language, framework, database, runtime, or library
// detected in the repository source code.
message Technology {
  option (openapi.v3.schema) = {
    title: "Technology"
    description: "A technology (language, framework, library, etc.) detected in the repository."
  };

  // Display name of the technology (e.g. Go, React, PostgreSQL).
  string name = 1 [(openapi.v3.property) = {
    description: "Display name of the technology."
    example: {yaml: "Go"}
  }];

  // Version string detected in the repository (e.g. from go.mod or package.json).
  string detected_version = 2 [(openapi.v3.property) = {
    description: "Version detected in the repository."
    example: {yaml: "1.21.0"}
  }];

  // Most recent stable release version available.
  string latest_version = 3 [(openapi.v3.property) = {
    description: "Latest stable release available."
    example: {yaml: "1.25.0"}
  }];

  // How current the detected version is.
  TechnologyStatus status = 4 [(openapi.v3.property) = {
    description: "Recency status of the detected version."
    example: {yaml: "TECHNOLOGY_STATUS_OUTDATED"}
  }];

  // Broad category: language | framework | database | runtime | library.
  string category = 5 [(openapi.v3.property) = {
    description: "Broad category: language, framework, database, runtime, or library."
    example: {yaml: "language"}
  }];

  // Stable machine identifier for icon and filter mapping (e.g. "laravel", "django", "react").
  // Lowercase, no variants, independent of how individual package managers name the package.
  // Empty for technologies not present in the framework catalog (custom or niche packages).
  string slug = 6 [(openapi.v3.property) = {
    description: "Stable machine identifier for icon/filter mapping. Empty when unknown."
    example: {yaml: "laravel"}
  }];
}

// Vulnerability describes a security finding in a dependency or the code itself.
message Vulnerability {
  option (openapi.v3.schema) = {
    title: "Vulnerability"
    description: "A security vulnerability detected in a dependency or the repository source."
  };

  // External identifier (e.g. CVE-2024-12345, GHSA-xxxx).
  string identifier_ref = 1 [(openapi.v3.property) = {
    description: "External vulnerability identifier (e.g. CVE or GHSA ID)."
    example: {yaml: "CVE-2024-12345"}
  }];

  // Severity level of the vulnerability.
  Severity severity = 2 [(openapi.v3.property) = {
    description: "Severity level."
    example: {yaml: "SEVERITY_HIGH"}
  }];

  // Name of the affected dependency or module.
  string component = 3 [(openapi.v3.property) = {
    description: "Name of the affected component or dependency."
    example: {yaml: "golang.org/x/net"}
  }];

  // Human-readable description of the vulnerability.
  string description = 4 [(openapi.v3.property) = {
    description: "Human-readable description of the vulnerability."
    example: {yaml: "HTTP/2 rapid reset attack allows denial of service."}
  }];

  // Version in which the vulnerability was fixed.
  string fixed_in_version = 5 [(openapi.v3.property) = {
    description: "Version in which the vulnerability was fixed."
    example: {yaml: "0.20.0"}
  }];

  // Full advisory text from OSV (Markdown). More detailed than description,
  // which maps to the one-line OSV summary.
  string details = 6 [
    (google.api.field_behavior) = OUTPUT_ONLY,
    (openapi.v3.property) = {
      description: "Full advisory description in Markdown (OSV details field). Richer than description."
      example: {yaml: "### Impact\\nAn attacker who..."}
    }
  ];

  // External reference URLs for this advisory (CVE NVD page, GitHub advisory,
  // fix commit, changelog, etc.).
  repeated string references = 7 [
    (google.api.field_behavior) = OUTPUT_ONLY,
    (openapi.v3.property) = {description: "URLs to external advisory pages, fix commits, and CVE databases."}
  ];
}

// RouteInfo is an HTTP route extracted from a web-framework route decorator.
message RouteInfo {
  option (openapi.v3.schema) = {
    title: "RouteInfo"
    description: "HTTP route extracted from a web-framework decorator."
  };

  // HTTP method(s), comma-joined when multiple (e.g. "GET" or "GET,POST").
  string method = 1 [(openapi.v3.property) = {
    description: "HTTP method(s), comma-joined when multiple."
    example: {yaml: "GET"}
  }];

  // URL path pattern (e.g. "/users/<int:user_id>").
  string path = 2 [(openapi.v3.property) = {
    description: "URL path pattern."
    example: {yaml: "/users/<int:user_id>"}
  }];

  // Name of the handler function.
  string handler = 3 [(openapi.v3.property) = {
    description: "Name of the handler function."
    example: {yaml: "get_user"}
  }];
}

// ModuleCard is a structural summary of a single source module as extracted by
// a Tier-2 language analyzer (Python, PHP, or any future supported language).
// It captures the public API surface, mutable module state, and route
// registrations found by static AST analysis (tree-sitter).
message ModuleCard {
  option (openapi.v3.schema) = {
    title: "ModuleCard"
    description: "Structural summary of a single source module (Python, PHP, or other Tier-2 supported language)."
  };

  // Fully-qualified module name as resolved by the language-specific module
  // resolver. Python uses dotted names (e.g. conduit.users.routes); PHP uses
  // backslash-separated names (e.g. BookStack\Entities\Models\Book).
  string module = 1 [(openapi.v3.property) = {
    description: "Fully-qualified module name (dotted for Python, e.g. conduit.users.routes; backslash-separated for PHP, e.g. BookStack\\\\Entities\\\\Models\\\\Book)."
    example: {yaml: "conduit.users.routes"}
  }];

  // Workspace-relative file path.
  string file = 2 [(openapi.v3.property) = {
    description: "Workspace-relative file path."
    example: {yaml: "conduit/users/routes.py"}
  }];

  // Names of module-level function definitions.
  repeated string functions = 3 [(openapi.v3.property) = {description: "Module-level function names."}];

  // Names of class definitions in this module. For PHP, each entry carries a
  // kind prefix: "class:Book", "trait:HandlesLogins", "interface:Renderable".
  // For Python, plain class names are used (e.g. "Article").
  repeated string classes = 4 [(openapi.v3.property) = {description: "Class names in this module. PHP entries carry a kind prefix (e.g. class:Book); Python entries are plain names."}];

  // Names of mutable module-level variables (non-ALL_CAPS assignments).
  repeated string module_level_state = 5 [(openapi.v3.property) = {description: "Mutable module-level variable names."}];

  // HTTP routes detected via route decorator analysis.
  repeated RouteInfo routes = 6 [(openapi.v3.property) = {description: "HTTP routes found on decorated functions."}];

  // First 120 characters of the module docstring, if present.
  string docstring_head = 7 [(openapi.v3.property) = {
    description: "First 120 characters of the module docstring."
    example: {yaml: "User authentication routes for the Conduit API."}
  }];

  // Non-blank, non-comment line count.
  uint32 loc = 8 [(openapi.v3.property) = {
    description: "Non-blank non-comment line count."
    example: {yaml: "42"}
  }];

  // Weighted fan-in: sum of edge weights from all importers of this module.
  // Computed from the dependency graph by the analysis pipeline (same formula
  // used by the deterministic scorer). Zero when the module is not imported.
  uint32 fan_in = 9 [(openapi.v3.property) = {
    description: "Weighted fan-in (sum of edge weights from importers). Same metric the scorer uses."
    example: {yaml: "19"}
  }];

  // Weighted fan-out: sum of edge weights to all modules this module imports.
  uint32 fan_out = 10 [(openapi.v3.property) = {
    description: "Weighted fan-out (sum of edge weights to imported modules)."
    example: {yaml: "5"}
  }];

  // True when this module has mutable module-level state AND fan_in >= 2.
  // Computed by the analysis pipeline using the same rule as the scorer/distiller.
  // Canonical flag — do not recompute from functions/state counts in the client.
  bool is_shared_state_hub = 11 [(openapi.v3.property) = {
    description: "True when module has mutable state and weighted fan-in >= 2 (canonical hub flag)."
    example: {yaml: "true"}
  }];

  // Weighted fan-in from production (non-test) importers only: sum of edge
  // weights from modules not in the test classification. Zero when all importers
  // are test modules, the module is not imported, or classification was skipped.
  // Use this value for display instead of fan_in to avoid inflating counts with
  // test-only dependencies.
  uint32 fan_in_from_production = 12 [(openapi.v3.property) = {
    description: "Weighted fan-in from non-test importers only. Use for display; falls back to fan_in when 0 and no classification is available."
    example: {yaml: "41"}
  }];
}

// SharedStateHub is a module that exposes mutable module-level state and is
// imported by at least two other modules (weighted fan-in ≥ 2). These are the
// canonical hubs as determined by the backend scorer — do not recompute in the client.
message SharedStateHub {
  option (openapi.v3.schema) = {
    title: "SharedStateHub"
    description: "Module with mutable state and weighted fan-in >= 2 (canonical shared-state hub)."
  };

  // Dotted module name.
  string module = 1 [(openapi.v3.property) = {description: "Dotted module name of the hub."}];

  // Names of the mutable module-level variables that constitute shared state.
  repeated string mutable_state = 2 [(openapi.v3.property) = {description: "Mutable module-level variable names."}];

  // Weighted fan-in: sum of edge weights from all importers (same as ModuleCard.fan_in).
  uint32 fan_in = 3 [(openapi.v3.property) = {
    description: "Weighted fan-in (sum of edge weights from importers)."
    example: {yaml: "19"}
  }];
}

// BlueprintInfo holds Flask Blueprint metadata correlated from Blueprint()
// definitions and register_blueprint() calls in a Python workspace.
message BlueprintInfo {
  option (openapi.v3.schema) = {
    title: "BlueprintInfo"
    description: "Flask Blueprint registration metadata."
  };

  // Blueprint name — first string argument of Blueprint(name, ...).
  string name = 1 [(openapi.v3.property) = {
    description: "Blueprint name."
    example: {yaml: "users"}
  }];

  // Workspace-relative file path where Blueprint() was instantiated.
  string file = 2 [(openapi.v3.property) = {
    description: "File where Blueprint() was defined."
    example: {yaml: "conduit/users/routes.py"}
  }];

  // URL prefix from register_blueprint(bp, url_prefix=...), empty if not registered.
  string url_prefix = 3 [(openapi.v3.property) = {
    description: "URL prefix from register_blueprint (empty if not found)."
    example: {yaml: "/users"}
  }];
}

// ModuleClassification holds the domain/infrastructure/test classification of
// every module in the dependency graph. Computed by the blueprint-group heuristic
// (or the fan-in structural fallback) — the same algorithm as the decomposition
// engine's DeterministicInfraDetector, intentionally kept separate so each
// worker can evolve its classification criteria independently.
message ModuleClassification {
  option (openapi.v3.schema) = {
    title: "ModuleClassification"
    description: "Domain/infrastructure/test classification of each module in the dependency graph."
  };

  // Modules classified as domain (business logic).
  repeated string domain_modules = 1 [(openapi.v3.property) = {description: "Modules carrying business/domain logic."}];

  // Modules classified as infrastructure (shared utilities, DB clients, config, etc.).
  repeated string infra_modules = 2 [(openapi.v3.property) = {description: "Modules classified as shared infrastructure."}];

  // Modules classified as tests (excluded from domain/infra partitions).
  repeated string test_modules = 3 [(openapi.v3.property) = {description: "Test modules excluded from domain/infra partitions."}];

  // Modules classified as application layer (controllers, middleware, CLI commands).
  // Populated only for languages with framework-aware classification (e.g. PHP/Laravel,
  // PHP/Symfony). Empty for Python and other generic stacks.
  repeated string application_modules = 5 [(openapi.v3.property) = {description: "Modules classified as application layer (HTTP controllers, middleware, CLI handlers)."}];

  // True when no blueprint groups were detected and the fan-in structural fallback
  // was applied. Signals that domain/infra boundaries are heuristic estimates.
  bool structural_fallback = 4 [(openapi.v3.property) = {
    description: "True when the fan-in structural fallback was used (no blueprint groups found)."
    example: {yaml: "false"}
  }];
}

// DependencyEdge is a directed edge in the inter-module dependency graph.
// A higher weight indicates stronger coupling.
message DependencyEdge {
  option (openapi.v3.schema) = {
    title: "DependencyEdge"
    description: "Directed edge between two modules in the dependency graph."
  };

  // Fully qualified name of the dependent module.
  string from_module = 1 [(openapi.v3.property) = {
    description: "Fully qualified name of the module with the dependency."
    example: {yaml: "service/orders"}
  }];

  // Fully qualified name of the module being depended on.
  string to_module = 2 [(openapi.v3.property) = {
    description: "Fully qualified name of the module being depended on."
    example: {yaml: "service/inventory"}
  }];

  // Coupling strength: higher values indicate more frequent inter-module calls.
  uint32 weight = 3 [(openapi.v3.property) = {
    description: "Coupling strength (higher = more coupled)."
    example: {yaml: "12"}
  }];
}
