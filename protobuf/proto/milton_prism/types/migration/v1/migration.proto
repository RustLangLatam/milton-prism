syntax = "proto3";

package milton_prism.types.migration.v1;

import "google/api/field_behavior.proto";
import "google/protobuf/timestamp.proto";
import "milton_prism/types/analysis/v1/analysis.proto";
import "milton_prism/types/common/v1/migrability.proto";
import "openapiv3/annotations.proto";

option cc_enable_arenas = true;
option csharp_namespace = "MiltonPrism.Types.Migration.V1";
option go_package = "milton_prism/pkg/pb/gen/milton_prism/types/migration/v1;migrationv1";
option java_multiple_files = true;
option java_outer_classname = "MigrationProtoV1";
option java_package = "com.miltonprism.types.migration.v1";
option objc_class_prefix = "MPR";

// ========== MIGRATION TYPES ==========

// MigrationState is the state machine governing a migration's lifecycle.
// The orchestrator drives transitions; this service guards validity.
enum MigrationState {
  // Default — migration has not been started.
  MIGRATION_STATE_UNSPECIFIED = 0;
  // Created, waiting to be started.
  MIGRATION_STATE_PENDING = 1;
  // Analysis engine is running against the repository.
  MIGRATION_STATE_ANALYZING = 2;
  // Design engine is producing the restructure plan.
  MIGRATION_STATE_DESIGNING = 3;
  // Awaiting human approval of the restructure plan.
  MIGRATION_STATE_AWAITING_APPROVAL = 4;
  // Code generation is in progress.
  MIGRATION_STATE_GENERATING = 5;
  // Generated output is being tested in sandbox.
  MIGRATION_STATE_TESTING = 6;
  // All checks passed; output is ready to push.
  MIGRATION_STATE_READY = 7;
  // Migration output has been pushed to the target.
  MIGRATION_STATE_PUSHED = 8;
  // Migration failed at one of the pipeline stages.
  MIGRATION_STATE_FAILED = 9;
  // Migration was cancelled by the user.
  MIGRATION_STATE_CANCELLED = 10;
  // Restructuring roadmap generated for a NOT_MIGRABLE or no-boundary migration.
  // Terminal state — no further transitions are possible.
  MIGRATION_STATE_RESTRUCTURING_READY = 11;
}

// TargetLanguage is the output language for the generated microservices.
//
// Support status per language (v1) — the generator is prompt-parametrised
// (Camino B): adding a language is a language profile doc + generator prompt +
// enum→profile mapping, not new templates. The status reflects how far each
// language profile is from end-to-end certification:
//
//   GO     — STABLE. Certified target (Go + MongoDB + gRPC). Filled profile and
//            generator prompt from working reference code.
//   PYTHON — EXPERIMENTAL. Real language profile + generator prompt exist
//            (milton-prism-python-profile.md, generator-prompt-python.md) and a
//            hand-written reference monorepo (python/) passes its gate, but the
//            generator path is NOT yet end-to-end certified (no containerised
//            generation run validated). Selectable so the profile can be
//            exercised; the UI should mark it EXPERIMENTAL.
//   RUST   — GENERATOR HOLE. No language profile doc and no generator prompt.
//            Enum value is registered so the selector can list it, but the
//            generator cannot produce Rust output. UI must mark it NOT SUPPORTED.
//   NODE   — GENERATOR HOLE. Same as Rust: no profile, no prompt, not generable.
enum TargetLanguage {
  // Default unspecified.
  TARGET_LANGUAGE_UNSPECIFIED = 0;
  // Go — STABLE. Certified output profile (Go + MongoDB + gRPC).
  TARGET_LANGUAGE_GO = 1;
  // Rust — GENERATOR HOLE. Registered for selection; no profile/prompt yet.
  TARGET_LANGUAGE_RUST = 2;
  // Python — EXPERIMENTAL. Real profile + generator prompt; not end-to-end certified.
  TARGET_LANGUAGE_PYTHON = 3;
  // Node/TypeScript — GENERATOR HOLE. Registered for selection; no profile/prompt yet.
  TARGET_LANGUAGE_NODE = 4;
  // Java — grpc-java (gRPC) / Spring Boot (HTTP); JPA for SQL.
  TARGET_LANGUAGE_JAVA = 5;
  // Ruby — grpc gem (gRPC) / Rails API|Sinatra (HTTP); Mongoid (Mongo) / ActiveRecord (SQL).
  TARGET_LANGUAGE_RUBY = 6;
  // C# / .NET — grpc-dotnet (gRPC) / ASP.NET Core (HTTP); MongoDB.Driver (Mongo) / EF Core (SQL).
  TARGET_LANGUAGE_CSHARP = 7;
  // C++ — grpc++ (gRPC) / Drogon (HTTP); mongocxx (Mongo) / libpqxx|mysql-connector (SQL). CMake build gate.
  TARGET_LANGUAGE_CPP = 8;
}

// TargetDatabase is the storage engine for the generated microservices.
enum TargetDatabase {
  // Default unspecified.
  TARGET_DATABASE_UNSPECIFIED = 0;
  // MongoDB — fully supported in v1.
  TARGET_DATABASE_MONGODB = 1;
  // PostgreSQL — profile hole; not supported in v1.
  TARGET_DATABASE_POSTGRES = 2;
  // MariaDB — profile hole; not supported in v1.
  TARGET_DATABASE_MARIADB = 3;
}

// Transport is the protocol the generated service speaks. It is an axis that is
// orthogonal to language and topology: the user picks it per migration, and any
// (language, transport) cell must be enabled in the generator matrix (see
// IsGenerableProtocol). gRPC is supported for every generable language; HTTP is
// supported for Go (first certified HTTP cell). The grpc-api-gateway is only
// emitted for the microservices+gRPC combination.
enum Transport {
  // Default unspecified — canonicalised to TRANSPORT_GRPC on CreateMigration.
  TRANSPORT_UNSPECIFIED = 0;
  // gRPC — supported for every generable language.
  TRANSPORT_GRPC = 1;
  // REST/HTTP — service exposes an HTTP-native router; supported for Go in v1.
  TRANSPORT_HTTP = 2;
  // 3 was TRANSPORT_NATS — removed from the offered set (out of scope).
  reserved 3;
}

// HttpFramework is the HTTP web framework the generated service's router and
// handlers are built on. It is a sub-axis that ONLY applies when the transport
// is TRANSPORT_HTTP — for gRPC it is ignored (left UNSPECIFIED). The values are
// flat and prefixed by language so the single enum can host every language's
// frameworks without collision; a given migration may only pick a framework
// from its own target language's set (see IsGenerableHttpFramework). When
// UNSPECIFIED on an HTTP migration the migration service canonicalises it to the
// language default (Go → GO_NET_HTTP, the certified HTTP cell).
//
// v1 state: only the Go set is declared. GO_NET_HTTP (the default, certified)
// and GO_GIN are generable; GO_ECHO/GO_CHI/GO_FIBER are registered for selection
// (the (language, framework) cell must be enabled in supportedHttpFrameworkByLanguage).
// Other languages' frameworks are reserved space to be filled later.
enum HttpFramework {
  // Default unspecified — for an HTTP migration, canonicalised to the target
  // language's default framework on CreateMigration; ignored for gRPC.
  HTTP_FRAMEWORK_UNSPECIFIED = 0;
  // Go — the standard library net/http router (the certified default HTTP cell).
  HTTP_FRAMEWORK_GO_NET_HTTP = 1;
  // Go — the Gin web framework (github.com/gin-gonic/gin).
  HTTP_FRAMEWORK_GO_GIN = 2;
  // Go — the Echo web framework (github.com/labstack/echo).
  HTTP_FRAMEWORK_GO_ECHO = 3;
  // Go — the chi router (github.com/go-chi/chi).
  HTTP_FRAMEWORK_GO_CHI = 4;
  // Go — the Fiber web framework (github.com/gofiber/fiber).
  HTTP_FRAMEWORK_GO_FIBER = 5;
}

// TargetTopology is the architectural shape of the generated output.
//
// MICROSERVICES (default): the decomposition engine partitions the monolith
// into N services that communicate over the inter_service_transport and are
// fronted by an HTTP/gRPC API gateway (the single entry point).
//
// MONOLITH: the plan is NOT partitioned — every domain module is grouped into a
// single service that exposes HTTP natively and is itself the entry point, with
// NO separate API gateway. A monolith-to-monolith modernisation: the output
// keeps a single-process topology but is regenerated on the target stack.
enum TargetTopology {
  // Default — treated as MICROSERVICES so existing flows are unaffected.
  TARGET_TOPOLOGY_UNSPECIFIED = 0;
  // Decompose into N microservices behind an API gateway (current/default).
  TARGET_TOPOLOGY_MICROSERVICES = 1;
  // Generate a single HTTP-native service with no API gateway.
  TARGET_TOPOLOGY_MONOLITH = 2;
}

// OutputTarget controls where migration output is pushed.
enum OutputTarget {
  // Default unspecified.
  OUTPUT_TARGET_UNSPECIFIED = 0;
  // Push to a new branch in the source repository.
  OUTPUT_TARGET_NEW_BRANCH = 1;
  // Push to a newly created remote repository.
  OUTPUT_TARGET_NEW_REPOSITORY = 2;
}

// Migration is the central aggregate that drives the end-to-end migration
// pipeline. It is the primary resource owned by the migration service.
message Migration {
  option (openapi.v3.schema) = {
    title: "Migration"
    description: "A migration run that decomposes a monolith into microservices."
  };

  // System-assigned monotonically increasing identifier.
  uint64 identifier = 1 [
    (google.api.field_behavior) = IDENTIFIER,
    (openapi.v3.property) = {
      description: "System-assigned unique identifier."
      example: {yaml: "7"}
    }
  ];

  // Identifier of the source repository to decompose.
  uint64 repository_id = 2 [
    (google.api.field_behavior) = REQUIRED,
    (openapi.v3.property) = {
      description: "Identifier of the source repository."
      example: {yaml: "42"}
    }
  ];

  // Identifier of the user that owns this migration.
  uint64 owner_user_id = 3 [
    (google.api.field_behavior) = REQUIRED,
    (openapi.v3.property) = {
      description: "Identifier of the owning user."
      example: {yaml: "1"}
    }
  ];

  // Branch of the source repository to analyse. Mandatory — a migration must
  // declare the branch it runs against.
  string source_branch = 4 [
    (google.api.field_behavior) = REQUIRED,
    (openapi.v3.property) = {
      description: "Source branch to analyse. Required."
      example: {yaml: "main"}
    }
  ];

  // Current lifecycle state.
  MigrationState state = 5 [(openapi.v3.property) = {
    description: "Current lifecycle state of the migration."
    example: {yaml: "MIGRATION_STATE_PENDING"}
  }];

  // Target stack configuration for the generated microservices.
  TargetConfig target = 6 [(openapi.v3.property) = {description: "Target language, database, and transport for the generated microservices."}];

  // Identifier of the AnalysisSummary produced for this migration.
  // Set by the analysis engine once the analysis run completes.
  uint64 analysis_summary_id = 7 [(openapi.v3.property) = {
    description: "AnalysisSummary identifier; set once analysis completes."
    example: {yaml: "0"}
  }];

  // Restructure plan produced by the design engine.
  // Requires human approval before code generation begins.
  RestructurePlan plan = 8 [(openapi.v3.property) = {description: "Proposed decomposition plan; requires human approval before generation."}];

  // Push coordinates once the migration output has been committed.
  MigrationOutput output = 9 [(openapi.v3.property) = {description: "Push coordinates set when the migration output is committed."}];

  // Per-service generation results. Populated when state is GENERATING, READY, or FAILED.
  // Each record reflects the latest known status for one service in the autonomous pipeline.
  repeated ServiceGenerationRecord generation_records = 14 [
    (google.api.field_behavior) = OUTPUT_ONLY,
    (openapi.v3.property) = {description: "Per-service autonomous generation results. Present when state is GENERATING, READY, or FAILED."}
  ];

  // Server-assigned creation timestamp. Immutable after creation.
  google.protobuf.Timestamp create_time = 10 [
    (google.api.field_behavior) = OUTPUT_ONLY,
    (google.api.field_behavior) = IMMUTABLE,
    (openapi.v3.property) = {
      description: "Creation timestamp (server-assigned, immutable)."
      example: {yaml: "2025-01-15T10:30:00Z"}
    }
  ];

  // Server-assigned last modification timestamp.
  google.protobuf.Timestamp update_time = 11 [
    (google.api.field_behavior) = OUTPUT_ONLY,
    (openapi.v3.property) = {
      description: "Last modification timestamp (server-assigned)."
      example: {yaml: "2025-06-01T08:00:00Z"}
    }
  ];

  // Soft-delete timestamp. Present only for logically deleted migrations.
  optional google.protobuf.Timestamp delete_time = 12 [
    (google.api.field_behavior) = OUTPUT_ONLY,
    (openapi.v3.property) = {
      description: "Soft-delete timestamp. Null while active."
      example: {yaml: "null"}
    }
  ];

  // Scheduled hard-delete timestamp after the retention window expires.
  optional google.protobuf.Timestamp purge_time = 13 [
    (google.api.field_behavior) = OUTPUT_ONLY,
    (openapi.v3.property) = {
      description: "Scheduled purge timestamp after retention window."
      example: {yaml: "null"}
    }
  ];

  // Human-readable reason set when state transitions to FAILED.
  // Written by the analysis or decomposition worker when a job exhausts all
  // Asynq retries. Empty for all other states.
  string failure_reason = 15 [
    (google.api.field_behavior) = OUTPUT_ONLY,
    (openapi.v3.property) = {description: "Failure reason when state is FAILED. Empty otherwise."}
  ];

  // Snapshot of the source repository's remote URL, captured at creation time.
  // Stored so that ListMigrations can display the repository without a cross-service lookup.
  string repository_url = 16 [
    (google.api.field_behavior) = OUTPUT_ONLY,
    (openapi.v3.property) = {
      description: "Remote URL of the source repository, snapshotted at migration creation."
      example: {yaml: "https://github.com/org/my-service"}
    }
  ];

  // LLM-produced migrability verdict. Absent until the user explicitly triggers
  // the assessment via AssessMigrability. A NOT_MIGRABLE verdict blocks Approve/Generate
  // unless migrability_override is true.
  milton_prism.types.common.v1.MigrabilityAssessment migrability_assessment = 17 [
    (google.api.field_behavior) = OUTPUT_ONLY,
    (openapi.v3.property) = {description: "Migrability verdict; absent until user runs the assessment."}
  ];

  // When true, a NOT_MIGRABLE verdict no longer blocks Approve/Generate.
  // Set explicitly by the user via SetMigrabilityOverride after reading the reasons.
  bool migrability_override = 18 [(openapi.v3.property) = {
    description: "When true, overrides a NOT_MIGRABLE block and allows generation to proceed."
    example: {yaml: "false"}
  }];

  // True when the ANALYZING step was completed by reusing a prior COMPLETED
  // AnalysisSummary for the same repository+branch+commit, skipping re-analysis.
  // Set by the analysis worker when it detects an identical commit on startup.
  bool analysis_reused = 19 [
    (google.api.field_behavior) = OUTPUT_ONLY,
    (openapi.v3.property) = {
      description: "True when analysis was reused from a prior run on the same commit."
      example: {yaml: "false"}
    }
  ];

  // Restructuring roadmap generated when the migration cannot be decomposed.
  // Populated by GenerateRestructuringRoadmap; absent until that RPC is called.
  RestructuringRoadmap restructuring_roadmap = 20 [
    (google.api.field_behavior) = OUTPUT_ONLY,
    (openapi.v3.property) = {description: "Restructuring roadmap for NOT_MIGRABLE or no-boundary migrations. Absent until GenerateRestructuringRoadmap is called."}
  ];

  // Identifier of the AnalysisSummary to reuse when starting this migration.
  // When non-zero and StartMigration is called, the migration adopts the existing
  // COMPLETED analysis (same repo, same owner) instead of dispatching a new run.
  // The migration jumps directly to DESIGNING. Write-once; absent after adoption.
  uint64 source_analysis_summary_id = 21 [
    (google.api.field_behavior) = INPUT_ONLY,
    (openapi.v3.property) = {
      description: "Optional: identifier of a completed AnalysisSummary to reuse. When set, StartMigration skips re-analysis and transitions directly to DESIGNING."
      example: {yaml: "0"}
    }
  ];

  // auto_approve records that the whole roadmap is being executed in a single
  // shot from the platform (RunMigration). When true, the design plan is
  // approved automatically the moment decomposition reaches AWAITING_APPROVAL,
  // so the pipeline flows analysis → design → generation without a human
  // approval click. The human gate that is NEVER lifted is the final publish
  // (git push): the run stops at READY/FAILED, never auto-pushing. The
  // migrability gate still applies — a NOT_MIGRABLE verdict without an override
  // blocks the auto-approval, exactly as a manual ApproveDesign would.
  bool auto_approve = 22 [(openapi.v3.property) = {
    description: "When true, the design plan is auto-approved on reaching AWAITING_APPROVAL so the full roadmap runs end-to-end (stops before the human-gated publish). Set by RunMigration."
    example: {yaml: "false"}
  }];

  // Optional repository-relative subdirectory to scope the analysis to.
  // Use this for monorepos where only one directory (e.g. "backend",
  // "services/api") holds the codebase to migrate. Empty (the default) means
  // the whole repository root is analysed — fully backward compatible.
  // The path is relative to the clone root, forward-slash separated, and must
  // stay inside the repository (no leading "/", no ".." traversal); an invalid
  // value is rejected at migration creation.
  string root_subdirectory = 23 [(openapi.v3.property) = {
    description: "Optional repository-relative subdirectory to scope the analysis to (monorepos). Empty means the whole repository root. Forward-slash separated, must stay inside the repo (no leading slash, no '..')."
    example: {yaml: "backend"}
  }];

  // Commit SHA the migration's analysis resolved (clone → resolveHEAD). Set by
  // the analysis worker when the analysis completes and the migration is linked
  // to its summary. Enforces uniqueness per (repository_id, source_branch,
  // commit_sha): a second migration at the same commit fails with MIG223 (no new
  // commits since the last migration). Empty while PENDING/ANALYZING.
  string commit_sha = 24 [
    (google.api.field_behavior) = OUTPUT_ONLY,
    (openapi.v3.property) = {
      description: "Commit SHA the migration's analysis resolved. Set once analysis completes. Empty while pending."
      example: {yaml: "abc123def456"}
    }
  ];

  // Number of services in the approved/proposed RestructurePlan. Derived in the
  // read-path from plan.services.length so the migration LIST can render a
  // services count without each client recomputing it from the full plan. Zero
  // for early states where no plan exists yet (PENDING/ANALYZING/DESIGNING). The
  // UI decides the LABEL ("Servicios" vs "Módulos") from the topology — this is
  // only the number.
  int32 service_count = 25 [
    (google.api.field_behavior) = OUTPUT_ONLY,
    (openapi.v3.property) = {
      description: "Number of services in the restructure plan (plan.services.length). Zero when no plan exists yet (early states)."
      example: {yaml: "6"}
    }
  ];
}

// TargetConfig specifies the desired output stack for the generated microservices.
message TargetConfig {
  option (openapi.v3.schema) = {
    title: "TargetConfig"
    description: "Target stack: language, database, and inter-service transport."
  };

  // Output programming language for generated microservices.
  TargetLanguage language = 1 [
    (google.api.field_behavior) = REQUIRED,
    (openapi.v3.property) = {
      description: "Output language. GO is the only certified target in v1. PYTHON is experimental (profile + generator prompt exist, not end-to-end certified). RUST and NODE are registered for selection but are generator holes (no profile/prompt; not generable). See the TargetLanguage enum for per-language status."
      example: {yaml: "TARGET_LANGUAGE_GO"}
    }
  ];

  // Storage engine for generated microservices.
  TargetDatabase database = 2 [
    (google.api.field_behavior) = REQUIRED,
    (openapi.v3.property) = {
      description: "Storage engine. Only TARGET_DATABASE_MONGODB is supported in v1."
      example: {yaml: "TARGET_DATABASE_MONGODB"}
    }
  ];

  // Protocol the generated service speaks. Orthogonal to language and topology.
  // Defaults to gRPC when unspecified. HTTP is supported for Go in v1; the
  // (language, transport) cell must be enabled in IsGenerableProtocol.
  Transport inter_service_transport = 3 [(openapi.v3.property) = {
    description: "Protocol the generated service speaks. Defaults to TRANSPORT_GRPC when unspecified. TRANSPORT_GRPC is supported for every generable language; TRANSPORT_HTTP is supported for GO in v1 (the service exposes an HTTP-native router and no API gateway)."
    example: {yaml: "TRANSPORT_GRPC"}
  }];

  // When true, the generated stack is exposed through an API gateway.
  // Ignored when topology is TARGET_TOPOLOGY_MONOLITH (a monolith is HTTP-native
  // and is its own entry point — no gateway is generated regardless of this flag).
  bool use_api_gateway = 4 [(openapi.v3.property) = {
    description: "Wrap generated services with an HTTP/gRPC gateway. Ignored for MONOLITH topology."
    example: {yaml: "true"}
  }];

  // Architectural target of the generated output. Selected when the migration is
  // created. Defaults to MICROSERVICES (TARGET_TOPOLOGY_UNSPECIFIED is treated as
  // MICROSERVICES) so existing migrations and the default flow are unaffected.
  //
  // MONOLITH instructs the decomposition engine to emit a single-service plan
  // (one service owning every domain module) and the generator to produce an
  // HTTP-native service with no API gateway.
  TargetTopology topology = 5 [(openapi.v3.property) = {
    description: "Architectural target: MICROSERVICES (default, decompose + gateway) or MONOLITH (single HTTP-native service, no gateway)."
    example: {yaml: "TARGET_TOPOLOGY_MICROSERVICES"}
  }];

  // Optional override of the authentication scheme the generated service must
  // implement. When UNSPECIFIED (the default), the generation engine uses the
  // scheme detected in the analysis (AnalysisSummary.auth_scheme_detection).
  // Set this to force a specific scheme regardless of what the source used —
  // e.g. to generate JWT validation even when detection was inconclusive, or to
  // generate no auth (AUTH_SCHEME_NONE) explicitly. v1 generates JWT and NONE;
  // other schemes are detected but emitted only as an honest prompt note.
  milton_prism.types.analysis.v1.AuthScheme target_auth_scheme = 6 [(openapi.v3.property) = {
    description: "Optional override of the auth scheme the generated service implements. UNSPECIFIED uses the detected scheme. v1 generates JWT and NONE."
    example: {yaml: "AUTH_SCHEME_UNSPECIFIED"}
  }];

  // HTTP web framework the generated service's router/handlers are built on.
  // ONLY meaningful when inter_service_transport is TRANSPORT_HTTP; ignored for
  // gRPC (left UNSPECIFIED). When UNSPECIFIED on an HTTP migration the service
  // canonicalises it to the target language's default (Go → GO_NET_HTTP). The
  // (language, framework) cell must be enabled in IsGenerableHttpFramework — v1
  // generates Go + net/http (default) and Go + Gin.
  HttpFramework http_framework = 7 [(openapi.v3.property) = {
    description: "HTTP web framework for the generated router/handlers. Only used when the transport is HTTP. UNSPECIFIED uses the language default (Go → GO_NET_HTTP). v1 generates Go net/http and Go Gin."
    example: {yaml: "HTTP_FRAMEWORK_UNSPECIFIED"}
  }];
}

// RestructurePlan is the design engine's proposed decomposition of the monolith.
// It must be approved by the owner before code generation begins.
message RestructurePlan {
  option (openapi.v3.schema) = {
    title: "RestructurePlan"
    description: "Proposed decomposition of the source monolith into named microservices."
  };

  // Proposed microservices to extract from the monolith.
  repeated ProposedService services = 1 [(openapi.v3.property) = {description: "Proposed microservices in the decomposition."}];

  // Natural-language rationale for the proposed boundaries.
  string rationale = 2 [(openapi.v3.property) = {
    description: "Design rationale explaining the proposed service boundaries."
    example: {yaml: "Orders and inventory are decoupled by domain and have different scaling needs."}
  }];

  // Operational couplings discovered between services. These originate from
  // view/controller-layer imports, not from the data model. In microservices
  // each coupling becomes a gRPC call or an async event; they do NOT imply a
  // deployment dependency and are separated from inter_service_deps to avoid
  // false cycles in the dependency graph.
  repeated OperationalCoupling operational_couplings = 3 [(openapi.v3.property) = {description: "View-layer couplings between services. Candidates for async events or gRPC calls — not hard deployment dependencies."}];

  // True when the graph-based clustering produced a low-modularity partition.
  // The plan is still returned as best-effort but requires extra human scrutiny.
  // The rationale string may also carry a [LOW CONFIDENCE] prefix for readability,
  // but this boolean is the programmatic source of truth.
  bool is_low_confidence = 4 [(openapi.v3.property) = {description: "True when the decomposition engine's modularity score was below the confidence threshold. Human review is strongly recommended before approving."}];

  // True when clustering found zero service boundaries. The codebase has no
  // identifiable domain layer and cannot be decomposed automatically.
  // When true, Approve/Generate is blocked — generation of zero services is not
  // meaningful. The programmatic source of truth; do not parse rationale strings.
  bool no_service_boundaries = 5 [(openapi.v3.property) = {description: "True when no service boundaries were found. Approve/Generate is blocked when this is set."}];

  // Human-readable explanation produced when no_service_boundaries is true.
  // Written in plain language for the UI — not Louvain jargon. Empty otherwise.
  string boundaries_explanation = 6 [(openapi.v3.property) = {description: "Plain-language explanation of why no service boundaries were found. Empty when no_service_boundaries is false."}];

  // LLM-derived candidate groupings from the cascading clusterer (C1 stage 2).
  // Empty until the LLM clustering adapter is wired; populated after C1 part 2.
  repeated CandidateGrouping candidate_groupings = 7 [(openapi.v3.property) = {description: "LLM-derived candidate service groupings. Empty until LLM clustering is wired."}];

  // LLM-derived restructure recommendations (C1 stage 2). Empty until wired.
  repeated RestructureRecommendation restructure_recommendations = 8 [(openapi.v3.property) = {description: "LLM-derived restructure recommendations. Empty until LLM clustering is wired."}];

  // Newman-Girvan modularity Q of the Louvain partition, in the range [−0.5, 1].
  // Computed on the domain sub-graph with affinity edges excluded so the value
  // is not inflated by blueprint bias. Typical interpretation:
  //   Q ≥ 0.30 → well-separated clusters (high confidence)
  //   Q ∈ [0.25, 0.30) → marginal — plan is flagged as low-confidence
  //   Q < 0.25 → weak partition (low confidence) or no real boundaries
  // Zero when no service boundaries were found (guardrail fired).
  // Informative only — not a component of the migrability score.
  double partition_modularity = 9 [(openapi.v3.property) = {description: "Newman-Girvan modularity Q of the Louvain clustering partition (domain sub-graph, affinity-edge-free). Range [−0.5, 1]; higher is better. Informative quality signal for the decomposition output, separate from the migrability score."}];
}

// CandidateGrouping is an LLM-proposed module grouping that may become a service.
// Populated by the LLM clustering adapter; empty in v1 deterministic-only mode.
message CandidateGrouping {
  option (openapi.v3.schema) = {
    title: "CandidateGrouping"
    description: "LLM-proposed grouping of modules that share a domain responsibility."
  };

  // Short name for this candidate group (e.g. "auth", "notifications").
  string name = 1 [(openapi.v3.property) = {description: "Candidate group name."}];

  // Module identifiers assigned to this group.
  repeated string modules = 2 [(openapi.v3.property) = {description: "Source modules in this candidate group."}];

  // Natural-language description of what this group is responsible for.
  repeated string responsibilities = 3 [(openapi.v3.property) = {description: "Domain responsibilities of this candidate group."}];

  // Confidence level: HIGH, MEDIUM, or LOW.
  string confidence = 4 [(openapi.v3.property) = {description: "Confidence in this grouping: HIGH, MEDIUM, or LOW."}];
}

// RestructureRecommendation is an LLM-derived action item for restructuring the codebase.
// Populated by the LLM clustering adapter; empty in v1 deterministic-only mode.
message RestructureRecommendation {
  option (openapi.v3.schema) = {
    title: "RestructureRecommendation"
    description: "An actionable recommendation produced by the LLM clustering engine."
  };

  // Kind of recommendation: EXTRACT_SERVICE, REFACTOR, DECOUPLE_STATE, etc.
  string kind = 1 [(openapi.v3.property) = {description: "Recommendation kind (e.g. EXTRACT_SERVICE, REFACTOR)."}];

  // The module, group, or pattern this recommendation targets.
  string subject = 2 [(openapi.v3.property) = {description: "Target of the recommendation (module name or pattern)."}];

  // Concrete action to take.
  string action = 3 [(openapi.v3.property) = {description: "Concrete action recommended."}];

  // True when this recommendation must be resolved before decomposition is valid.
  bool blocking = 4 [(openapi.v3.property) = {description: "True when this recommendation blocks decomposition approval."}];
}

// ProposedService describes one microservice in the restructure plan.
message ProposedService {
  option (openapi.v3.schema) = {
    title: "ProposedService"
    description: "A single microservice proposed in the restructure plan."
  };

  // Canonical name for the proposed service.
  string name = 1 [(openapi.v3.property) = {
    description: "Canonical service name."
    example: {yaml: "order-service"}
  }];

  // Error prefix allocated for this service in the error registry.
  string error_prefix = 2 [(openapi.v3.property) = {
    description: "Allocated error prefix for this service (e.g. ORD)."
    example: {yaml: "ORD"}
  }];

  // Resources (domain entities) owned exclusively by this service.
  repeated string owned_resources = 3 [(openapi.v3.property) = {description: "Domain resources owned exclusively by this service."}];

  // Identifiers of other services this one depends on.
  repeated string inter_service_deps = 4 [(openapi.v3.property) = {description: "Other services this service depends on."}];

  // Foreign keys in this service's domain model that reference another service's
  // owned table. Listed as deferred consistency debt; the generator uses these
  // to emit the correct inter-service gRPC client stubs.
  repeated CrossServiceFk cross_service_fks = 5 [(openapi.v3.property) = {description: "Cross-service foreign keys that the generator will turn into gRPC client stubs."}];
}

// CrossServiceFk describes a single foreign-key reference that crosses a
// service boundary. The generator uses this to create the inter-service gRPC
// client for the owning service instead of a local DB column.
message CrossServiceFk {
  option (openapi.v3.schema) = {
    title: "CrossServiceFk"
    description: "A foreign-key reference that crosses a service boundary."
  };

  // Service whose domain model contains the referencing field.
  string owner_service = 1 [(openapi.v3.property) = {
    description: "Service that owns the referencing field."
    example: {yaml: "articles"}
  }];

  // Proto field name in the owner service (AIP-style, e.g. author_identifier).
  string field = 2 [(openapi.v3.property) = {
    description: "AIP proto field name of the referencing field."
    example: {yaml: "author_identifier"}
  }];

  // SQLAlchemy __tablename__ of the referenced table (e.g. usersprofile).
  string ref_table = 3 [(openapi.v3.property) = {
    description: "SQLAlchemy __tablename__ of the referenced table."
    example: {yaml: "usersprofile"}
  }];

  // Service that owns the referenced table (e.g. user).
  string ref_service = 4 [(openapi.v3.property) = {
    description: "Service that owns the referenced table."
    example: {yaml: "user"}
  }];

  // Proto resource type in the referenced service (e.g. User).
  // Empty when not yet resolved by the contract deriver.
  string ref_resource = 5 [(openapi.v3.property) = {
    description: "Proto resource name in the referenced service. Empty if not yet resolved."
    example: {yaml: "User"}
  }];

  // Proto message name in the owner service that contains this field.
  // Allows distinguishing two FKs with the same field name in different messages
  // (e.g. Article.author_identifier vs Comment.author_identifier in the articles service).
  string owner_message = 6 [(openapi.v3.property) = {
    description: "Proto message name in the owner service that contains this field (e.g. Article, Comment)."
    example: {yaml: "Article"}
  }];
}

// OperationalCoupling records an import-level coupling between services that
// originates from a view/controller layer module. These are NOT data-model
// dependencies: they reflect present-monolith wiring that becomes an async
// event or a gRPC call after decomposition. Separating them from
// inter_service_deps prevents view-layer bidirectionality from creating false
// cycles in the deployment dependency graph.
message OperationalCoupling {
  option (openapi.v3.schema) = {
    title: "OperationalCoupling"
    description: "A view-layer import coupling between two services. Becomes an async event or gRPC call after decomposition."
  };

  // Service whose view/controller layer contains the import.
  string from_service = 1 [(openapi.v3.property) = {
    description: "Service whose view or controller layer references the other service."
    example: {yaml: "user"}
  }];

  // Service that is referenced by the import.
  string to_service = 2 [(openapi.v3.property) = {
    description: "Service that is referenced."
    example: {yaml: "profile"}
  }];

  // The specific module in from_service that contains the import statement.
  string source_module = 3 [(openapi.v3.property) = {
    description: "Fully-qualified module name that contains the cross-service import."
    example: {yaml: "conduit.user.views"}
  }];
}

// MigrationOutput records where the migration result was pushed.
message MigrationOutput {
  option (openapi.v3.schema) = {
    title: "MigrationOutput"
    description: "Push coordinates of the committed migration output."
  };

  // Whether output was pushed to a new branch or a new repository.
  OutputTarget output_target = 1 [(openapi.v3.property) = {
    description: "Whether the output was pushed to a new branch or a new repository."
    example: {yaml: "OUTPUT_TARGET_NEW_BRANCH"}
  }];

  // Branch name when output_target is OUTPUT_TARGET_NEW_BRANCH.
  string branch_name = 2 [(openapi.v3.property) = {
    description: "Branch that received the migration output (when pushing to a branch)."
    example: {yaml: "migration/output-2025"}
  }];

  // Remote URL of the newly created repository when output_target is
  // OUTPUT_TARGET_NEW_REPOSITORY.
  string new_repository_url = 3 [(openapi.v3.property) = {
    description: "URL of the newly created repository (when pushing to a new repo)."
    example: {yaml: "https://github.com/org/my-service-migrated"}
  }];
}

// FailureClass classifies WHY a service's generation failed, so the panel can
// decide whether a retry is worth offering. It is computed by the generation
// worker at persist time (single source: ClassifyFailure) and surfaced read-only
// on each ServiceGenerationRecord.
//
//   TRANSIENT — rate-limit (429/overloaded), infrastructure, or deadline failures.
//               A retry is likely to succeed once the throttle/outage clears.
//   DESIGN    — a deterministic-gate red (the service did not compile / its tests
//               failed) or a not-migrable/incomplete-contract service. A retry may
//               still be attempted but is de-emphasised — the input plan is the
//               likely cause.
enum FailureClass {
  // Default — no classification (e.g. the service has not failed).
  FAILURE_CLASS_UNSPECIFIED = 0;
  // Transient failure (rate-limit / overload / infrastructure / deadline).
  FAILURE_CLASS_TRANSIENT = 1;
  // Design/contract failure (gate-red, not-migrable, incomplete contract).
  FAILURE_CLASS_DESIGN = 2;
}

// ServiceGenerationRecord captures the per-service outcome of autonomous code generation.
// Written by the generation worker as each service progresses through its pipeline.
message ServiceGenerationRecord {
  option (openapi.v3.schema) = {
    title: "ServiceGenerationRecord"
    description: "Per-service outcome of autonomous code generation."
  };

  // Canonical service name.
  string service_name = 1 [(openapi.v3.property) = {description: "Service name."}];

  // Lifecycle status: generating / verifying / done / failed.
  string status = 2 [(openapi.v3.property) = {description: "Generation status: generating, verifying, done, or failed."}];

  // True when all verification gates passed (buf lint, go build, go vet, go test).
  bool gates_passed = 3 [(openapi.v3.property) = {description: "True when all verification gates passed."}];

  // Human-readable failure reason when status is failed.
  string failure_reason = 4 [(openapi.v3.property) = {description: "Failure reason when status is failed. Empty otherwise."}];

  // Accumulated API cost for this service's generation run in USD.
  double total_cost_usd = 5 [(openapi.v3.property) = {description: "Accumulated API cost in USD."}];

  // Number of files emitted by the generator.
  int32 generated_file_count = 6 [(openapi.v3.property) = {description: "Number of files emitted."}];

  // Raw textual output from the generation agent (verification report, file list).
  // Useful for diagnosing generation results in the UI.
  string agent_raw_result = 7 [
    (google.api.field_behavior) = OUTPUT_ONLY,
    (openapi.v3.property) = {description: "Raw agent output (generation report). Useful for debugging; empty while still generating."}
  ];

  // Non-cached input tokens consumed by this service's generation run.
  int64 input_tokens = 8 [
    (google.api.field_behavior) = OUTPUT_ONLY,
    (openapi.v3.property) = {description: "Non-cached input tokens consumed by this service."}
  ];

  // Input tokens written to the prompt cache by this service's generation run.
  int64 cache_creation_input_tokens = 9 [
    (google.api.field_behavior) = OUTPUT_ONLY,
    (openapi.v3.property) = {description: "Cache-creation input tokens consumed by this service."}
  ];

  // Input tokens served from the prompt cache for this service's generation run.
  int64 cache_read_input_tokens = 10 [
    (google.api.field_behavior) = OUTPUT_ONLY,
    (openapi.v3.property) = {description: "Cache-read input tokens consumed by this service."}
  ];

  // Output tokens produced by this service's generation run.
  int64 output_tokens = 11 [
    (google.api.field_behavior) = OUTPUT_ONLY,
    (openapi.v3.property) = {description: "Output tokens produced by this service."}
  ];

  // Classification of WHY this service failed, set only when status is failed.
  // TRANSIENT (rate-limit/overload/infra/deadline) → a retry is likely to help;
  // DESIGN (gate-red / not-migrable / incomplete contract) → retry de-emphasised.
  // Computed by the generation worker at persist time; UNSPECIFIED otherwise.
  FailureClass failure_class = 12 [
    (google.api.field_behavior) = OUTPUT_ONLY,
    (openapi.v3.property) = {description: "Failure classification (TRANSIENT or DESIGN) when status is failed. UNSPECIFIED otherwise."}
  ];
}

// FileArtifact represents one source file produced by the autonomous generation agent.
message FileArtifact {
  option (openapi.v3.schema) = {
    title: "FileArtifact"
    description: "A single generated source file produced by the autonomous code generation agent."
  };

  // Relative path within the monorepo root (e.g. core/services/user/domain/domain.go).
  string path = 1 [(openapi.v3.property) = {
    description: "Relative path within the monorepo."
    example: {yaml: "core/services/user/domain/domain.go"}
  }];

  // UTF-8 source content of the file. All generated output in v1 is text.
  string content = 2 [(openapi.v3.property) = {description: "UTF-8 source content of the generated file."}];
}

// ServiceGenerationArtifacts groups the generated source files for one service.
// Returned by GetGenerationArtifacts; intentionally separate from GetMigration so
// that status-polling does not load code payloads.
message ServiceGenerationArtifacts {
  option (openapi.v3.schema) = {
    title: "ServiceGenerationArtifacts"
    description: "Generated source files and generation metadata for one service."
  };

  // Canonical service name.
  string service_name = 1 [(openapi.v3.property) = {description: "Service name."}];

  // Generated source files for this service, sorted by path.
  repeated FileArtifact files = 2 [(openapi.v3.property) = {description: "Generated source files sorted by path."}];

  // Raw textual output from the generation agent. Useful for debugging in the UI.
  // Empty when the service failed before the agent produced output.
  string agent_raw_result = 3 [(openapi.v3.property) = {description: "Raw agent output for this service. Useful for debugging failures."}];
}

// ServiceGenerationSpec bundles everything needed to generate one microservice.
// It is assembled from persisted design_artifacts when the migration reaches GENERATING.
message ServiceGenerationSpec {
  option (openapi.v3.schema) = {
    title: "ServiceGenerationSpec"
    description: "All artifacts needed to generate one microservice from the decomposition plan."
  };

  // Service name as derived by the decomposition engine (e.g. "articles").
  string name = 1 [(openapi.v3.property) = {description: "Service name."}];

  // Error-code prefix assigned by the orchestrator registry (e.g. "ART").
  string error_prefix = 2 [(openapi.v3.property) = {description: "Error-code prefix assigned to this service."}];

  // Raw .proto file content derived by the contract deriver.
  // Contains TODO markers for non-CRUD routes that require human/LLM completion.
  string proto_content = 3 [(openapi.v3.property) = {description: "Proto contract derived by the decomposition engine."}];

  // YAML boundary spec consumed by the service generator.
  string boundary_spec = 4 [(openapi.v3.property) = {description: "YAML boundary spec for the service generator."}];

  // True when the deriver could not fully resolve this service's contract.
  bool incomplete = 5 [(openapi.v3.property) = {description: "True when the contract deriver flagged this service as incomplete."}];

  // Human-readable reason when incomplete is true.
  string incomplete_reason = 6 [(openapi.v3.property) = {description: "Reason the service was flagged incomplete."}];

  // Path to the generator prompt document for the target profile.
  string generator_prompt_ref = 7 [(openapi.v3.property) = {description: "Path to the generator prompt document for this service's target profile."}];

  // Effective authentication scheme the generated service must implement,
  // resolved by the migration service as target_auth_scheme (override) ?? the
  // scheme detected in the analysis. Lowercase canonical token: "jwt", "none",
  // "oauth2", "session_cookie", "api_key", "basic". v1 generates "jwt" and
  // "none"; any other value is carried for an honest prompt note (no guess).
  // Empty is treated as "none".
  string auth_scheme = 8 [(openapi.v3.property) = {
    description: "Effective auth scheme to implement (jwt/none/oauth2/session_cookie/api_key/basic). v1 generates jwt and none."
    example: {yaml: "jwt"}
  }];

  // JWT signature algorithm family the generated validation must accept, when
  // auth_scheme is "jwt": "HS256" (symmetric secret) or "RS256"/"ES256"/"EdDSA"
  // (asymmetric public key). Empty for non-JWT schemes or when undetermined —
  // the generator then accepts the idiomatic default for the stack.
  string auth_signature_alg = 9 [(openapi.v3.property) = {
    description: "JWT signature algorithm family the generated validation accepts (HS256/RS256/ES256/EdDSA). Empty for non-JWT or undetermined."
    example: {yaml: "HS256"}
  }];
}

// GenerationPackage is the ready-to-use package assembled for a GENERATING migration.
// It contains one ServiceGenerationSpec per proposed service.
message GenerationPackage {
  option (openapi.v3.schema) = {
    title: "GenerationPackage"
    description: "Complete generation package for a GENERATING migration: one spec per service."
  };

  // Identifier of the migration this package belongs to.
  uint64 migration_id = 1 [(openapi.v3.property) = {description: "Migration identifier."}];

  // Target output profile derived from the migration's TargetConfig (e.g. \"go\", \"python\").
  string output_profile = 2 [(openapi.v3.property) = {description: "Output profile name (go or python)."}];

  // One spec per proposed service, in the same order as the RestructurePlan.
  repeated ServiceGenerationSpec services = 3 [(openapi.v3.property) = {description: "Per-service generation specs."}];
}

// RoadmapDiagnosis is the assessment summary embedded in a RestructuringRoadmap.
message RoadmapDiagnosis {
  option (openapi.v3.schema) = {
    title: "RoadmapDiagnosis"
    description: "Assessment summary that triggered the restructuring roadmap."
  };

  string verdict = 1 [(openapi.v3.property) = {description: "Migrability verdict: NOT_MIGRABLE or the reason for no boundaries."}];
  string summary = 2 [(openapi.v3.property) = {description: "1-2 sentence description of the codebase's architectural pattern."}];
  optional int32 migrability_score = 3 [(openapi.v3.property) = {description: "Structural migrability score 0–100. Absent when verdict is INCOMPLETE_NO_STRUCTURAL_DATA (no graph to score)."}];
  string confidence = 4 [(openapi.v3.property) = {description: "Model confidence: HIGH, MEDIUM, or LOW."}];
  repeated string blockers = 5 [(openapi.v3.property) = {description: "Structural blockers preventing decomposition."}];
}

// StructuralProblem records one scored impediment to decomposition.
// Entries are ordered by penalty descending in the roadmap.
message StructuralProblem {
  option (openapi.v3.schema) = {
    title: "StructuralProblem"
    description: "A scored structural impediment to microservice decomposition."
  };

  string signal = 1 [(openapi.v3.property) = {description: "Signal identifier (e.g. hub_severity, god_modules)."}];
  int32 penalty = 2 [(openapi.v3.property) = {description: "Score penalty applied by this signal (higher = worse)."}];
  string detail = 3 [(openapi.v3.property) = {description: "Human-readable explanation of what was detected."}];
}

// ActionItem is one concrete restructuring step derived from a score signal penalty.
// Steps are ordered by impact descending; dependencies are modelled via depends_on_step.
message ActionItem {
  option (openapi.v3.schema) = {
    title: "ActionItem"
    description: "A concrete restructuring step derived from a score signal. Ordered by impact (score points recovered)."
  };

  string kind = 1 [(openapi.v3.property) = {description: "Step kind (EXTRACT_DOMAIN, DECOUPLE_STATE, SPLIT_GOD_MODULE, DEFINE_BOUNDARIES, ADD_ROUTING)."}];
  string subject = 2 [(openapi.v3.property) = {description: "Target of the action (module name or list)."}];
  string action = 3 [(openapi.v3.property) = {description: "Concrete action to take, using real module names where available."}];
  bool blocking = 4 [(openapi.v3.property) = {description: "True when this action must be resolved before decomposition is valid."}];
  int32 impact = 5 [(openapi.v3.property) = {description: "Score points recovered when this step is resolved (+N to migrability score)."}];
  int32 order = 6 [(openapi.v3.property) = {description: "Execution sequence (1-based). Lower order must be resolved first."}];
  int32 depends_on_step = 7 [(openapi.v3.property) = {description: "Order number of the prerequisite step. Zero means no dependency."}];
}

// EnrichedStep is an LLM-written narrative for one deterministic action step.
// It supplements the action text already in ActionItem — it does not replace it.
message EnrichedStep {
  option (openapi.v3.schema) = {
    title: "EnrichedStep"
    description: "LLM-written narrative for one restructuring step, keyed by step order."
  };

  // Order number matching the corresponding ActionItem.order (1-based).
  int32 step_order = 1 [(openapi.v3.property) = {description: "ActionItem.order this narrative belongs to."}];

  // Concrete 2–4 sentence narrative specific to this codebase's modules.
  string narrative = 2 [(openapi.v3.property) = {description: "LLM-written explanation of why this step is needed and how to execute it for this specific codebase."}];
}

// RoadmapEnrichment is the optional LLM enrichment layer for a RestructuringRoadmap.
// Present only after EnrichRoadmap is called. The deterministic action_plan is always
// the fallback when enrichment is absent.
message RoadmapEnrichment {
  option (openapi.v3.schema) = {
    title: "RoadmapEnrichment"
    description: "LLM enrichment of the deterministic action plan. One narrative per step. Absent until EnrichRoadmap is called."
  };

  // One narrative per ActionItem, ordered by step_order ascending.
  repeated EnrichedStep steps = 1 [(openapi.v3.property) = {description: "LLM narratives for each action step, keyed by step_order."}];

  // Accumulated API cost for this enrichment call in USD.
  double cost_usd = 2 [(openapi.v3.property) = {description: "Accumulated API cost in USD for this enrichment call."}];

  // When the enrichment was produced.
  google.protobuf.Timestamp enriched_time = 3 [
    (google.api.field_behavior) = OUTPUT_ONLY,
    (openapi.v3.property) = {description: "When the LLM enrichment was produced."}
  ];
}

// RestructuringRoadmap is the automated plan for a NOT_MIGRABLE or no-boundary
// migration. Generated synchronously from persisted assessment and plan data —
// no additional LLM call is made. Persisted on the migration when
// GenerateRestructuringRoadmap is called; transitions the migration to
// RESTRUCTURING_READY (terminal).
message RestructuringRoadmap {
  option (openapi.v3.schema) = {
    title: "RestructuringRoadmap"
    description: "Automated restructuring plan for a migration that cannot be decomposed. Generated from persisted assessment data without an LLM call."
  };

  RoadmapDiagnosis diagnosis = 1 [(openapi.v3.property) = {description: "Assessment summary that triggered this roadmap."}];
  repeated StructuralProblem structural_problems = 2 [(openapi.v3.property) = {description: "Scored structural impediments, ordered by penalty descending."}];
  repeated ActionItem action_plan = 3 [(openapi.v3.property) = {description: "Concrete restructuring steps; blocking items first."}];
  string boundaries_explanation = 4 [(openapi.v3.property) = {description: "Plain-language explanation of why no service boundaries were found. Empty when not applicable."}];
  google.protobuf.Timestamp generated_time = 5 [
    (google.api.field_behavior) = OUTPUT_ONLY,
    (openapi.v3.property) = {description: "When the roadmap was generated."}
  ];

  // Optional LLM enrichment. Absent until EnrichRoadmap is called.
  // The action_plan is always available as a fallback when this field is absent.
  RoadmapEnrichment enrichment = 6 [
    (google.api.field_behavior) = OUTPUT_ONLY,
    (openapi.v3.property) = {description: "LLM-written narratives for each action step. Absent until EnrichRoadmap is called; action_plan is the fallback."}
  ];

  // Optional LLM blueprint. Absent until GenerateBlueprint is called.
  // When is_hypothetical is true the blueprint is a post-restructuring target,
  // not a description of the current codebase.
  ServiceBlueprint blueprint = 7 [
    (google.api.field_behavior) = OUTPUT_ONLY,
    (openapi.v3.property) = {description: "LLM-proposed target service blueprint anchored to coupling data. Absent until GenerateBlueprint is called."}
  ];
}

// BlueprintService is one proposed microservice inside a ServiceBlueprint.
// Modules are real names from the dependency graph; rationale references
// measured coupling (edge weights) — it never invents groupings.
message BlueprintService {
  option (openapi.v3.schema) = {
    title: "BlueprintService"
    description: "One proposed microservice in the LLM blueprint, grounded in coupling data."
  };

  // Canonical name for this proposed service (kebab-case, e.g. user-service).
  string name = 1 [(openapi.v3.property) = {description: "Proposed service name."}];

  // Module names from the dependency graph assigned to this service.
  repeated string modules = 2 [(openapi.v3.property) = {description: "Modules from the dependency graph that belong to this service."}];

  // Why these modules belong together — must reference measured coupling (edge
  // weights, fan-in/out) rather than name similarity.
  string rationale = 3 [(openapi.v3.property) = {description: "Coupling-anchored rationale for this service boundary."}];
}

// ServiceBlueprint is the opt-in LLM-proposed microservice grouping for a
// restructuring roadmap. Generated by GenerateBlueprint from the full
// AnalysisDigest (graph + module cards + clustering result). Persisted
// separately from the enrichment so the two can be generated independently.
//
// When is_hypothetical is true (always the case for no-boundary codebases)
// the services list is a post-restructuring target — it requires the
// action_plan blocking steps to be completed first.
message ServiceBlueprint {
  option (openapi.v3.schema) = {
    title: "ServiceBlueprint"
    description: "LLM-proposed microservice grouping anchored to the dependency graph. Absent until GenerateBlueprint is called."
  };

  // Proposed services. Empty when the blueprint is not reliable enough to
  // name services (e.g. no domain layer present — see precondition_note).
  repeated BlueprintService services = 1 [(openapi.v3.property) = {description: "Proposed microservices, each grounded in coupling data."}];

  // True when the blueprint is a post-restructuring target rather than
  // a description of the current codebase. Always true when
  // NoServiceBoundaries was set in the digest.
  bool is_hypothetical = 2 [(openapi.v3.property) = {description: "True when the blueprint is a post-restructuring target, not a current-state description."}];

  // LLM-generated explanation of what must be done before this blueprint is
  // actionable. References specific blocking steps from the action_plan by order.
  // Empty when is_hypothetical is false.
  string precondition_note = 3 [(openapi.v3.property) = {description: "What must be done before this blueprint is actionable (references action_plan blocking steps)."}];

  // Order numbers of the blocking action_plan steps that must be completed
  // before this blueprint is valid. Empty when is_hypothetical is false.
  repeated int32 required_steps = 4 [(openapi.v3.property) = {description: "ActionItem.order values that must be resolved before this blueprint is actionable."}];

  // Accumulated API cost for this call in USD.
  double cost_usd = 5 [(openapi.v3.property) = {description: "Accumulated API cost in USD for this generation call."}];

  // When the blueprint was produced.
  google.protobuf.Timestamp generated_time = 6 [
    (google.api.field_behavior) = OUTPUT_ONLY,
    (openapi.v3.property) = {description: "When the LLM blueprint was produced."}
  ];

  // Optional note from the LLM on how confident it is in the proposed groupings.
  // Useful when the coupling data is thin or ambiguous.
  string confidence_note = 7 [(openapi.v3.property) = {description: "LLM confidence note on the proposed groupings. Empty when confidence is high."}];
}

// MigrationsFilter constrains the set of migrations returned by ListMigrations.
message MigrationsFilter {
  option (openapi.v3.schema) = {
    title: "MigrationsFilter"
    description: "Optional filters for listing migrations."
  };

  // Restrict results to migrations owned by this user.
  optional uint64 owner_user_id = 1 [(openapi.v3.property) = {
    description: "Filter by owner user identifier."
    example: {yaml: "1"}
  }];

  // Restrict results to migrations against this repository.
  optional uint64 repository_id = 2 [(openapi.v3.property) = {
    description: "Filter by source repository identifier."
    example: {yaml: "42"}
  }];

  // Restrict results to migrations in this lifecycle state.
  optional MigrationState state = 3 [(openapi.v3.property) = {
    description: "Filter by migration lifecycle state."
    example: {yaml: "MIGRATION_STATE_PENDING"}
  }];

  // Restrict results to migrations in ANY of these lifecycle states.
  // When non-empty, takes precedence over state (singular).
  // Translates to a single MongoDB $in query so pagination covers the union.
  repeated MigrationState states = 4 [(openapi.v3.property) = {
    description: "Filter by multiple lifecycle states (OR). Takes precedence over state when non-empty."
    example: {yaml: "[MIGRATION_STATE_ANALYZING, MIGRATION_STATE_DESIGNING, MIGRATION_STATE_GENERATING]"}
  }];

  // Restrict results to migrations linked to this analysis summary. Enables
  // listing every migration produced from one analysis (multi-migration per
  // analysis) and powers the live-migration guard that blocks deleting an
  // analysis while it still has active migrations.
  optional uint64 analysis_summary_id = 5 [(openapi.v3.property) = {
    description: "Filter by linked analysis summary identifier."
    example: {yaml: "10"}
  }];

  // Restrict results to migrations with this target topology (MICROSERVICES /
  // MONOLITH). Resolved server-side against the denormalized topology field.
  optional TargetTopology topology = 6 [(openapi.v3.property) = {
    description: "Filter by target topology (one cell axis of the generation matrix)."
    example: {yaml: "TARGET_TOPOLOGY_MONOLITH"}
  }];

  // Restrict results to migrations whose inter-service transport (protocol) is
  // this value (GRPC / HTTP). Resolved server-side against the denormalized
  // protocol field.
  optional Transport protocol = 7 [(openapi.v3.property) = {
    description: "Filter by inter-service transport / protocol (one cell axis of the generation matrix)."
    example: {yaml: "TRANSPORT_HTTP"}
  }];

  // Restrict results to migrations targeting this language (GO / RUST / PYTHON /
  // NODE). Resolved server-side against the denormalized language field.
  optional TargetLanguage language = 8 [(openapi.v3.property) = {
    description: "Filter by target language (one cell axis of the generation matrix)."
    example: {yaml: "TARGET_LANGUAGE_RUST"}
  }];
}
