syntax = "proto3";

package milton_prism.types.pagination.v1;

import "google/api/field_behavior.proto";
import "openapiv3/annotations.proto";

option cc_enable_arenas = true;
option csharp_namespace = "MiltonPrism.WellKnownTypes";
option go_package = "milton_prism/types/pagination/v1;pagination";
option java_multiple_files = true;
option java_outer_classname = "PaginationProto";
option java_package = "milton_prism.types.pagination.v1";
option objc_class_prefix = "MP";

// Pagination information.
message Pagination {
  // Current page number being viewed.
  uint32 current_page = 1 [
    (google.api.field_behavior) = OUTPUT_ONLY,
    (openapi.v3.property) = {
      description: "Current page number"
      example: {yaml: "1"}
      read_only: true
    }
  ];

  // Number of entries displayed on each page.
  uint32 page_size = 2 [
    (google.api.field_behavior) = OUTPUT_ONLY,
    (openapi.v3.property) = {
      description: "Entries per page"
      example: {yaml: "10"}
      read_only: true
    }
  ];

  // Total number of entries in the list being paginated.
  uint64 total_size = 3 [
    (google.api.field_behavior) = OUTPUT_ONLY,
    (openapi.v3.property) = {
      description: "Total number of entries"
      example: {yaml: "100"}
      read_only: true
    }
  ];

  // Total number of pages based on the per_page and total_entries.
  uint64 total_pages = 4 [
    (google.api.field_behavior) = OUTPUT_ONLY,
    (openapi.v3.property) = {
      description: "Total number of pages"
      example: {yaml: "10"}
      read_only: true
    }
  ];
}
