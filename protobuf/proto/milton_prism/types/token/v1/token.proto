syntax = "proto3";

package milton_prism.types.token.v1;

import "google/api/field_behavior.proto";
import "google/protobuf/timestamp.proto";
import "openapiv3/annotations.proto";

option cc_enable_arenas = true;
option csharp_namespace = "MiltonPrism.Types.Token";
option go_package = "milton_prism/types/token/v1;token";
option java_multiple_files = true;
option java_outer_classname = "TokenProto";
option java_package = "milton_prism.types.token.v1";
option objc_class_prefix = "MP";

// AuthorizationTokens contains the set of tokens returned from a successful authorization grant.
message AuthorizationTokens {
  Token access_token = 1 [
    (google.api.field_behavior) = OUTPUT_ONLY,
    (openapi.v3.property) = {
      description: "Short-lived access token (JWT)"
      read_only: true
    }
  ];

  Token refresh_token = 2 [
    (google.api.field_behavior) = OUTPUT_ONLY,
    (openapi.v3.property) = {
      description: "Long-lived refresh token (JWT)"
      read_only: true
    }
  ];

  uint32 expires_in = 3 [
    (google.api.field_behavior) = OUTPUT_ONLY,
    (openapi.v3.property) = {
      description: "Lifetime in seconds of the access token"
      example: {yaml: "3600"}
      read_only: true
    }
  ];
}

// Token represents a cryptographic token (JWT).
message Token {
  string value = 1 [
    (google.api.field_behavior) = OUTPUT_ONLY,
    (openapi.v3.property) = {
      description: "Token value (JWT)"
      format: "JWT"
      read_only: true
    }
  ];

  optional google.protobuf.Timestamp expire_time = 2 [
    (google.api.field_behavior) = OUTPUT_ONLY,
    (openapi.v3.property) = {
      description: "Expiration time of the token"
      read_only: true
    }
  ];
}
