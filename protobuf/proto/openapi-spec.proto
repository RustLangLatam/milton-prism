syntax = "proto3";
package api;

import "openapiv3/annotations.proto";

option (openapi.v3.document) = {
  info: {
    title: "Milton Prism API-Gateway"
    description: "The **Milton Prism API-Gateway** is the single entry point for all external traffic. It translates HTTP/JSON requests into gRPC calls and forwards them to the appropriate backend microservice.\n\n### API Design Standards\n\nAll RPCs follow **Google API Improvement Proposals (AIPs)**."
    contact: {
      name: "Milton Prism API Support"
      email: "rust.lang.latam@gmail.com"
    }
  }
  components: {
    schemas: {
      additional_properties: {
        name: "ApiErrorMessage"
        value: {
          schema: {
            required: [
              "detail",
              "status",
              "title"
            ]
            type: "object"
            properties: {
              additional_properties: {
                name: "detail"
                value: {
                  schema: {
                    type: "string"
                    description: "Human-readable message describing the error."
                  }
                }
              }
              additional_properties: {
                name: "status"
                value: {
                  schema: {
                    type: "integer"
                    description: "The http status code of the error."
                  }
                }
              }
              additional_properties: {
                name: "title"
                value: {
                  schema: {
                    type: "string"
                    description: "A short, human-readable summary of the error."
                  }
                }
              }
            }
          }
        }
      }
    }
    security_schemes: {
      additional_properties: {
        name: "Authorization"
        value: {
          security_scheme: {
            description: "JWT Authorization Token. Usage: `Bearer {TOKEN}`."
            type: "http"
            scheme: "bearer"
            bearer_format: "JWT"
          }
        }
      }
      additional_properties: {
        name: "Refresh"
        value: {
          security_scheme: {
            description: "JWT Refresh Token. Usage: `Bearer {TOKEN}`."
            type: "http"
            scheme: "bearer"
            bearer_format: "JWT"
          }
        }
      }
      additional_properties: {
        name: "ApiKey"
        value: {
          security_scheme: {
            description: "Milton Prism API key passed in the request header."
            name: "MiltonPrismApiKey"
            type: "apiKey"
            in: "header"
          }
        }
      }
    }
  }
};
